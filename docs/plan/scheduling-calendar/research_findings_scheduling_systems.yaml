    availability_display: "Grid view showing instructor + aircraft availability; students see open blocks"
    student_privacy: "Students see their own bookings only; cannot see other students' schedules"
    pricing: "Enterprise SaaS — requires demo/quote (typically $200-500/mo based on fleet size)"
    relevance_to_merlin: "Overkill for single-instructor operation. Their 'intelligent scheduling' concept is inspiring but designed for multi-instructor/multi-aircraft fleets. The slot-based paradigm matches Merlin's existing architecture."

  - name: "FlightCircle"
