plan_id: scheduling-calendar
objective: "Research best calendar/scheduling systems for flight schools and service-based businesses to inform Merlin Flight Training's scheduling calendar architecture"
focus_area: scheduling_and_booking_systems
created_at: "2026-04-05"
created_by: gem-researcher
status: completed

tldr: |
  - Flight school scheduling software (Flight Schedule Pro, FlightCircle) uses slot-based calendars with instructor-creates, student-selects paradigm — matching Merlin's existing architecture
  - Calendly/Cal.com/Acuity prove that availability-first slot display with 3-step booking (select type → pick time → confirm details) is the gold standard for UX conversion
  - For a single-instructor school, a hybrid model works best: pre-published availability slots for enrolled students + a separate request-based funnel for discovery flight prospects
  - Student privacy is solved through RLS policies (already in place) — students see only available/booked status per slot, never other student names; admin sees everything
  - CalDAV bidirectional sync (already built via tsdav) is the correct approach and matches FlightCircle's iCal sync model

research_metadata:
  methodology: "Hybrid retrieval: web fetching of flight school software sites (Flight Schedule Pro, FlightCircle, FlightBridge), consumer scheduling platforms (Calendly, Cal.com, Acuity/Squarespace Scheduling), supplemented by codebase analysis of existing Merlin implementation (SETUP.sql, AdminBookingPlanner.tsx, CalDAV lib, API routes)"
  scope: "Broad: 4 flight school platforms, 4 consumer scheduling platforms, existing codebase patterns, PRD requirements"
  confidence: high
  coverage: 85
  decision_blockers: 1
  research_blockers: 0

# ============================================================
# SECTION 1: FLIGHT SCHOOL SCHEDULING SOFTWARE
# ============================================================
