    context: "PRD says 'students request, admin approves' but this adds friction. Calendly/Acuity data shows self-service has 2-3x higher booking rates."
    type: decision_blocker
    affects: ["booking-flow-implementation", "admin-ui-design"]

  - question: "What is the slot duration granularity — fixed 1.5hr blocks or variable?"
    context: "Current slots have arbitrary start_time/end_time. PRD mentions 'duration' in cost estimator. Most flight schools use 1.5-2hr standard blocks."
    type: research
    affects: ["availability-template-design", "cost-estimator"]

  - question: "Should the availability computation include aircraft availability?"
    context: "Single-aircraft operation currently, but PRD's aircraft table supports multiple. If instructor and aircraft are both required, availability = instructor ∩ aircraft."
    type: nice_to_know
    affects: ["future-multi-aircraft-support"]

