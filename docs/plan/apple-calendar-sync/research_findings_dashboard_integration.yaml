plan_id: apple-calendar-sync
objective: "Determine whether Apple Calendar (CalDAV) integrates with the student dashboard and how to confirm it's working"
focus_area: dashboard_integration
created_at: "2026-04-05"
created_by: gem-researcher
status: completed

tldr: |
  - Apple Calendar (CalDAV) integration EXISTS and is fully implemented via the `tsdav` library connecting to `caldav.icloud.com`.
  - The student dashboard at `/dashboard` does NOT directly call CalDAV — it reads from `Supabase bookings+slots` tables, which are kept in sync with Apple Calendar via CalDAV bidirectional sync.
  - The data flow is: Apple Calendar ↔ CalDAV sync (Netlify cron every 10min) ↔ Supabase `slots` table ↔ Student dashboard (reads `bookings` joined with `slots`).
  - Three API endpoints exist for CalDAV operations (`/api/admin/caldav/sync`, `/api/admin/caldav/push`, `/api/admin/caldav/test`), plus a Netlify scheduled function for automated polling.
  - Google Calendar integration is DEPRECATED — left as dead code in `lib/google-calendar.ts` and `app/api/book/route.ts`.

research_metadata:
  methodology: "Hybrid retrieval — semantic_search + grep_search for caldav/sync/dashboard patterns, read_file for detailed examination of all relevant files, relationship discovery via import tracing"
  scope: "Full codebase analysis of CalDAV integration, dashboard data flow, API routes, database schema, scheduled functions, and configuration"
  confidence: high
  coverage: 95
  decision_blockers: 0
  research_blockers: 0

