    - from: "app/api/admin/bookings/manual/route.ts"
      to: "lib/caldav.ts"
      relationship: imports
    - from: "app/dashboard/page.tsx"
      to: "Supabase bookings+slots"
      relationship: "reads (indirect dependency on CalDAV sync)"

