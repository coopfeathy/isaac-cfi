answers:
  does_apple_calendar_integrate_with_student_dashboard:
    answer: "YES — indirectly. Apple Calendar (CalDAV) syncs bidirectionally with the Supabase `slots` table. The student dashboard reads from `bookings` joined with `slots`. When the instructor creates/modifies events in Apple Calendar, the Netlify cron (every 10 min) pulls changes into Supabase, which the dashboard then displays."
    
  how_data_flows_to_dashboard: |
    1. Instructor creates/moves/deletes event in Apple Calendar
    2. Every 10 minutes, Netlify function `caldav-sync` runs:
       a. Connects to caldav.icloud.com via tsdav
       b. Pulls events using sync token for incremental changes
       c. For existing slots: updates start_time/end_time in Supabase
       d. For new events: creates slot + auto-matches student from SUMMARY → creates booking
       e. Sends email to student for new inbound bookings
    3. Student opens /dashboard:
       a. Queries Supabase: bookings filtered by user_id + status (confirmed/paid/completed)
       b. Joins with slots for time/type/description
       c. Joins with syllabus_lessons for lesson details
       d. Renders weekly calendar view

  how_to_confirm_it_is_working:
    step_1_test_connection:
      description: "Call the CalDAV test endpoint to verify iCloud connectivity"
      method: "GET /api/admin/caldav/test (with admin Bearer token)"
      expected: "{ connected: true, calendars: [...] } — should list at least one calendar"
      what_failure_means: "ICLOUD_APP_PASSWORD is wrong/missing, or apple_id in caldav_settings is incorrect"
    
    step_2_verify_database_config:
      description: "Check caldav_settings table in Supabase"
      query: "SELECT apple_id, calendar_url, is_active, sync_token, last_sync_at FROM caldav_settings LIMIT 1"
      expected: "is_active = true, apple_id populated, calendar_url populated, last_sync_at recent (within 10 min)"
      what_failure_means: "CalDAV settings not configured — admin needs to save Apple ID and select a calendar"
    
    step_3_verify_outbound_push:
      description: "Create a test booking via admin and check it appears in Apple Calendar"
      method: "POST /api/admin/bookings/manual with a test student + time"
      then_check:
        - "Apple Calendar should show the event within seconds"
        - "Supabase: SELECT caldav_uid, caldav_etag, sync_status FROM slots WHERE id = '<slot_id>' should show sync_status = 'synced'"
    
    step_4_verify_inbound_pull:
      description: "Modify an event in Apple Calendar and wait for sync"
      steps:
        - "Move an existing Merlin event to a different time in Apple Calendar"
        - "Wait up to 10 minutes for Netlify cron to run"
        - "Check Supabase: SELECT start_time, end_time, last_synced_at FROM slots WHERE caldav_uid IS NOT NULL"
        - "Verify the slot times match the calendar change"
        - "Student dashboard should show updated time"
    
    step_5_check_netlify_function_logs:
      description: "Monitor Netlify function logs for caldav-sync execution"
      where: "Netlify dashboard → Functions → caldav-sync → Logs"
      expected: "Should see 'CalDAV sync complete: { pushed: N, pulled: N, deleted: N, errors: 0 }' every 10 min"
      what_failure_means: "If errors > 0, check the specific error messages in logs"
    
    step_6_verify_dashboard_shows_data:
      description: "Log in as a student who has a synced booking"
      steps:
        - "Navigate to /dashboard"
        - "Check the current week — should show the booking with time + lesson details"
        - "If linked to syllabus_lesson, should show lesson title, ground topics, flight maneuvers"
    
    step_7_run_unit_tests:
      description: "Run the CalDAV unit test suite"
