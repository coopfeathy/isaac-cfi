gaps:
  - area: "No admin UI for CalDAV settings management"
    description: "The code references caldav_settings but there's no visible admin UI page to configure Apple ID, select calendar, or toggle sync. Settings must be managed via Supabase dashboard or API directly."
    impact: nice_to_know
    affects: []
  - area: "No CalDAV sync status visibility on student dashboard"
    description: "Students cannot see whether their booking is synced with Apple Calendar. The sync_status column exists on slots but is not displayed in the dashboard UI."
    impact: nice_to_know
    affects: []
  - area: "No retry mechanism for failed pushes beyond pending_push"
    description: "If a CalDAV push fails, sync_status is set to pending_push and the Netlify cron retries next cycle. But there's no max-retry counter or exponential backoff — a permanently failing push would retry indefinitely every 10 minutes."
    impact: nice_to_know
    affects: []
  - area: "Google Calendar dead code"
    description: "lib/google-calendar.ts and app/api/book/route.ts still contain deprecated Google Calendar code. Not harmful but adds confusion."
    impact: nice_to_know
    affects: []
