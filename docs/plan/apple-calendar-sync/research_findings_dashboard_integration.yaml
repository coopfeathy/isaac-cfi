    - component: caldav_settings table
      responsibility: "Stores Apple ID, calendar URL, sync token, lock state"
      location: supabase/SETUP.sql
      relationship_to_domain: "configuration for all CalDAV operations"

  interfaces_used_by_domain:
    - interface: Supabase slots table (caldav_uid, caldav_etag, sync_status, last_synced_at)
      location: supabase/SETUP.sql:1882-1895
      usage_pattern: "CalDAV sync reads/writes these columns to track sync state per slot"
    - interface: Supabase caldav_settings table
      location: supabase/SETUP.sql:1922-1946
      usage_pattern: "All CalDAV operations load settings (apple_id, calendar_url, sync_token, is_active) from this table"
    - interface: tsdav DAVClient
      location: "package.json (tsdav ^2.1.8)"
      usage_pattern: "Used in createCalDAVClient() — the underlying CalDAV protocol library"

  data_flow_involving_domain: |
    OUTBOUND (App → Apple Calendar):
    1. Admin creates booking via /api/admin/bookings/manual → slot created in Supabase
    2. backgroundTasks() calls pushEventToCalendar() via CalDAV to iCloud
    3. On success: caldav_uid, caldav_etag, sync_status='synced' saved to slot
    4. On failure: sync_status='pending_push' — picked up by Netlify cron next cycle
    
    INBOUND (Apple Calendar → App → Dashboard):
    1. Netlify cron (every 10 min) calls pullEventsFromCalendar()
    2. For existing slots: updates start_time/end_time if changed in calendar
    3. For new events: creates slot + matches student via SUMMARY parsing → creates booking
    4. Sends email notification to matched student
    5. Student loads /dashboard → queries `bookings` table joined with `slots` → sees updated data
    
    DASHBOARD READ PATH:
    1. Student visits /dashboard
    2. useEffect fetches from Supabase: bookings.select("..., slots(...)").eq("user_id", user.id)
    3. Displays weekly calendar with lesson details from syllabus_lessons
    4. NO direct CalDAV calls from the dashboard — reads Supabase only

  key_relationships_to_domain:
