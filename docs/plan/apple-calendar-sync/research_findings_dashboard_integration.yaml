patterns_found:
  - category: architecture
    pattern: "Indirect CalDAV-Dashboard Integration"
    description: "The student dashboard never calls CalDAV directly. Instead, CalDAV sync writes to Supabase `slots` table, and the dashboard reads from `bookings` joined with `slots`. CalDAV is a background sync layer."
    examples:
      - file: app/dashboard/page.tsx
        location: "line 78-85"
        snippet: |
          const { data: bookingData } = await supabase
            .from("bookings")
            .select("id, status, syllabus_lesson_id, slots(id, start_time, end_time, type, description)")
            .eq("user_id", user.id)
            .in("status", ["confirmed", "paid", "completed"])
      - file: netlify/functions/caldav-sync.ts
        location: "line 162-174"
        snippet: |
          if (existingSlot.start_time !== calStart || existingSlot.end_time !== calEnd) {
            await supabase.from('slots').update({ start_time: calStart, end_time: calEnd, ... })
    prevalence: common

  - category: architecture
    pattern: "Fire-and-forget CalDAV Push"
    description: "When admin creates a booking, CalDAV push is asynchronous and non-blocking. If push fails, sync_status is set to 'pending_push' for the scheduled function to retry."
    examples:
      - file: app/api/admin/bookings/manual/route.ts
        location: "line 121-182"
        snippet: "backgroundTasks runs CalDAV push after booking creation, catches errors and sets pending_push"
    prevalence: common

  - category: architecture
    pattern: "Advisory Lock for Scheduled Sync"
    description: "The Netlify cron function uses sync_in_progress boolean with 15-min stale timeout to prevent concurrent sync runs."
    examples:
      - file: netlify/functions/caldav-sync.ts
        location: "line 40-50"
        snippet: |
          const { data: lockResult } = await supabase
            .from('caldav_settings')
            .update({ sync_in_progress: true })
            .eq('id', settings.id)
            .or(`sync_in_progress.eq.false,last_sync_started_at.lt.${fifteenMinAgo}`)
    prevalence: occasional

  - category: naming
    pattern: "UID convention: {slotId}@merlinflight.com"
    description: "All CalDAV events use UID format {slotId}@merlinflight.com. Pull operations filter events to only process those with this domain suffix."
    examples:
      - file: lib/caldav.ts
        location: "line 97"
        snippet: "const uid = `${slot.id}@merlinflight.com`"
      - file: lib/caldav.ts
        location: "line 252"
        snippet: "if (!uid || !uid.endsWith('@merlinflight.com')) continue"
    prevalence: common

  - category: error_handling
    pattern: "Credential scrubbing in errors"
    description: "All CalDAV error messages are scrubbed via scrubCredentials() to prevent ICLOUD_APP_PASSWORD leaking in logs."
    examples:
      - file: lib/caldav.ts
        location: "line 69-72"
        snippet: "return message.replaceAll(password, '***')"
    prevalence: common

  - category: architecture
    pattern: "Inbound event creates slot + auto-matches student"
    description: "When the Netlify cron pulls a new event from Apple Calendar, it parses the student name from the SUMMARY field, matches against profiles table, creates a slot, and auto-creates a booking if matched."
    examples:
      - file: netlify/functions/caldav-sync.ts
        location: "line 192-230"
        snippet: |
          const summaryMatch = event.summary.match(/(?:Flight Training|Discovery Flight)\s*(?:with\s+|-\s*)?(.+?)(?:\s*\|.*)?$/i)
          // ... tries exact then partial profile match
    prevalence: occasional

