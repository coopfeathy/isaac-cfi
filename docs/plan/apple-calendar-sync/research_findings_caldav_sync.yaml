plan_id: apple-calendar-sync
objective: Research the most practical approach for bidirectional Apple Calendar (iCloud) sync from the Merlin Flight Training Next.js/Netlify app
focus_area: CalDAV protocol, iCloud integration, sync architecture, serverless constraints
created_at: "2026-04-05"
created_by: gem-researcher
status: completed

tldr: |
  - tsdav (v2.1.8, 74K weekly downloads, native TypeScript) is the clear best library — it has explicit iCloud CalDAV support with syncCalendars() using ctag/etag/sync-token change detection
  - iCloud CalDAV requires app-specific passwords (no OAuth) via Basic auth to caldav.icloud.com; Apple does NOT expose a public calendar API
  - Full bidirectional CalDAV sync IS achievable on Netlify using a Scheduled Function (cron every 5-15 min) + a Background Function (up to 15 min execution) for the actual sync work
  - The RECOMMENDED approach is a hybrid: Supabase as source of truth → push events to iCloud via CalDAV → poll iCloud for external changes on a cron → reconcile via UID mapping
  - Apple Calendar subscriptions (.ics feeds) are READ-ONLY and cannot be used for bidirectional sync; the Google Calendar bridge adds unnecessary complexity

research_metadata:
  methodology: "Hybrid retrieval: semantic_search of codebase + grep_search for patterns, fetch_webpage for tsdav docs/npm/GitHub, sabre.io CalDAV protocol guide, Apple support docs, Netlify docs. Sequential analysis of library comparison, protocol constraints, and architecture fit."
  scope: "Deep examination of CalDAV protocol mechanics, all viable Node.js CalDAV libraries, iCloud-specific auth/endpoints, Netlify serverless constraints, and existing codebase calendar infrastructure"
  confidence: high
  coverage: 95
  decision_blockers: 0
  research_blockers: 0

