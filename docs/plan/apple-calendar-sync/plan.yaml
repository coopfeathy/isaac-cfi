         - Require admin auth
         - Load caldav_settings from Supabase (decrypt password)
         - Call createCalDAVClient() then fetchCalendars()
         - Return {connected: true, calendars: [{name, url}]} or error

      3. POST /api/admin/caldav/sync/route.ts:
         - Require admin auth
         - Load caldav_settings, call syncCalendar()
