plan_id: apple-calendar-sync
objective: Build bidirectional Apple Calendar sync + student dashboard with syllabus-linked lessons + email notifications
created_at: "2026-04-05"
created_by: gem-planner
status: pending_approval
research_confidence: high

plan_metrics:
  wave_1_task_count: 3
  total_dependencies: 14
  risk_score: medium

tldr: |
  Bidirectional CalDAV sync between Supabase and iCloud via tsdav library, plus a student-facing weekly dashboard
  showing syllabus-linked lessons, and email notifications when lessons are scheduled.

  Wave 1 (parallel): DB schema migration, CalDAV client library, TypeScript type updates
  Wave 2 (parallel): API routes for CalDAV CRUD, Netlify scheduled sync function, email template
  Wave 3 (parallel): Student dashboard page, admin CalDAV settings UI, admin booking planner syllabus integration
  Wave 4: Integration wiring — connect booking creation to CalDAV push + email send

  Architecture: Supabase is source of truth. Outbound push on booking mutation. Inbound poll every 10 min via
  Netlify Scheduled Function. Conflict resolution: app wins. UID mapping via slot.id@merlinflight.com convention.

open_questions:
  - Which iCloud calendar name should be targeted (e.g., "Merlin Flight Training")? Configurable via admin settings UI.
  - Should inbound sync from Apple Calendar auto-create bookings for unrecognized students, or only match existing students?

pre_mortem:
  overall_risk_level: medium
  critical_failure_modes:
    - scenario: iCloud rate-limits or blocks CalDAV polling from Netlify IPs
      likelihood: low
      impact: high
      mitigation: Implement exponential backoff on 429/503 responses; reduce poll frequency to 15-30 min if rate-limited; log and alert on consecutive failures
    - scenario: App-specific password is revoked/expired without admin noticing
      likelihood: medium
      impact: high
      mitigation: Health check on each sync run; store last successful sync time; alert admin via email if sync fails 3 consecutive times; admin settings UI shows connection status
    - scenario: CalDAV sync function exceeds Netlify 10s timeout for regular functions
      likelihood: medium
      impact: medium
      mitigation: Use Netlify Background Function (15 min limit) for sync; batch operations; early-exit if no changes detected via ctag comparison
    - scenario: Conflict when instructor edits event in both Apple Calendar and app simultaneously
      likelihood: low
      impact: medium
      mitigation: App-wins conflict resolution policy; last_synced_at + etag comparison; if conflict detected, keep app version and overwrite iCloud; log conflicts for admin review
    - scenario: VEVENT parsing fails on non-standard calendar entries (all-day events, recurring events)
      likelihood: medium
      impact: low
      mitigation: Skip non-matching events (no DTSTART/DTEND pair or all-day); only sync events with UID matching *@merlinflight.com pattern for inbound; log skipped events
  assumptions:
    - Instructor has an Apple ID with 2FA enabled and can generate app-specific passwords
    - Single instructor means single CalDAV account (no multi-user calendar coordination)
    - Netlify Scheduled Functions support cron syntax and Background Functions are available on the current plan
    - tsdav v2.1.8 supports iCloud CalDAV discovery and CRUD as documented
    - Student emails in profiles table are accurate for email notification delivery

implementation_specification:
  code_structure: |
    New files:
    - lib/caldav.ts — CalDAV client wrapper (connect, push, pull, delete, sync)
    - app/api/admin/caldav/settings/route.ts — Save/retrieve CalDAV credentials
    - app/api/admin/caldav/test/route.ts — Test CalDAV connection
    - app/api/admin/caldav/sync/route.ts — Manual sync trigger
    - app/api/admin/caldav/push/route.ts — Push single event
    - netlify/functions/caldav-sync.ts — Scheduled sync function (every 10 min)
    - app/dashboard/page.tsx — Student weekly lesson dashboard
    - app/admin/calendar/page.tsx — Admin CalDAV settings UI

    Modified files:
    - supabase/SETUP.sql — Add columns to slots/bookings, add caldav_settings table
    - lib/supabase.ts — Add TypeScript interfaces for new tables/columns
    - lib/resend.ts — Add lessonScheduled email template
    - app/api/admin/bookings/manual/route.ts — Add CalDAV push + email after booking creation
    - app/components/AdminBookingPlanner.tsx — Add syllabus lesson picker dropdown

  affected_areas:
    - supabase/ — Schema migration for sync columns and caldav_settings table
    - lib/ — New CalDAV client library, type updates, email template
    - app/api/admin/ — New CalDAV API routes, updated booking route
    - app/dashboard/ — New student dashboard page
    - app/admin/calendar/ — New admin settings page
    - app/components/ — AdminBookingPlanner syllabus enhancement
    - netlify/functions/ — New scheduled sync function

  component_details:
    - component: CalDAV Client Library (lib/caldav.ts)
      responsibility: |
        Encapsulate all tsdav interactions. Create DAVClient connection. Push VEVENT to iCloud.
        Pull changes via syncCalendars(). Delete events. Map Supabase slot data to VEVENT format.
        Handle ctag/etag change detection. Return structured results for caller error handling.
      interfaces:
        - "createCalDAVClient(settings: CalDAVSettings): Promise<DAVClient>"
        - "pushEventToCalendar(client: DAVClient, calendarUrl: string, slot: Slot, studentName: string): Promise<{etag: string, url: string}>"
        - "pullEventsFromCalendar(client: DAVClient, calendarUrl: string, syncToken?: string): Promise<{events: CalDAVEvent[], newSyncToken: string}>"
        - "deleteCalendarEvent(client: DAVClient, eventUrl: string, etag: string): Promise<void>"
        - "syncCalendar(settings: CalDAVSettings): Promise<SyncResult>"

    - component: CalDAV Settings API (app/api/admin/caldav/*)
      responsibility: |
        Admin-only endpoints for managing CalDAV connection. Save credentials encrypted via pgcrypto.
        Test connection by attempting client.login() + fetchCalendars(). Trigger manual sync.
        Push individual events after booking creation.
      interfaces:
        - "POST /api/admin/caldav/settings — body: {apple_id, app_password, calendar_url?}"
        - "GET /api/admin/caldav/test — returns {connected: boolean, calendars: string[]}"
        - "POST /api/admin/caldav/sync — returns {created: number, updated: number, deleted: number, errors: string[]}"
        - "POST /api/admin/caldav/push — body: {slot_id} — returns {success: boolean, caldav_uid: string}"

    - component: Netlify CalDAV Sync Function (netlify/functions/caldav-sync.ts)
      responsibility: |
        Scheduled function running every 10 minutes. Reads caldav_settings from Supabase.
        Polls iCloud for changes using stored sync_token. Creates/updates/deletes slots and bookings
        based on calendar changes. Pushes any pending outbound changes. Updates sync metadata.
        Conflict resolution: app version wins.
      interfaces:
        - "Netlify Config export: schedule '*/10 * * * *'"
        - "Reads/writes: slots, bookings, caldav_settings tables"

    - component: Student Dashboard (app/dashboard/page.tsx)
      responsibility: |
        Server-rendered page for logged-in students. Fetches bookings for current/next week with
        joined syllabus_lessons data. Displays weekly calendar view (Mon-Sun) with day headers.
        Each lesson card shows date/time, syllabus lesson title, ground topics, flight maneuvers,
        completion standards, and status (upcoming/today/completed). Navigation for this week/next week.
        Quick links to full syllabus, progress tracking, bookings page.
      interfaces:
        - "Route: /dashboard (protected, student-only)"
        - "Data: bookings JOIN slots JOIN syllabus_lessons via booking.syllabus_lesson_id"

    - component: Admin CalDAV Settings UI (app/admin/calendar/page.tsx)
      responsibility: |
        Admin-only page for configuring iCloud CalDAV connection. Apple ID input, masked
        app-specific password input. Test connection button with status indicator. Manual sync
        trigger button. Shows last sync timestamp and sync status. Error display for failed syncs.
      interfaces:
        - "Route: /admin/calendar (protected, admin-only)"
        - "Calls: /api/admin/caldav/settings, /api/admin/caldav/test, /api/admin/caldav/sync"

    - component: Lesson Scheduled Email Template (lib/resend.ts)
      responsibility: |
        New email template matching existing Merlin branding (emailWrapper pattern).
        Shows student name, lesson date/time, syllabus lesson title, ground topics list,
        flight maneuvers list. Sent when admin creates booking or CalDAV inbound sync creates booking.
      interfaces:
        - "lessonScheduled(studentName, lessonTitle, date, time, groundTopics, flightManeuvers): {subject, html}"

    - component: Admin Booking Planner Enhancement (AdminBookingPlanner.tsx)
      responsibility: |
        Add optional syllabus lesson picker dropdown to the booking creation form within the
        existing AdminBookingPlanner component. When creating a booking, the selected syllabus
        lesson ID is passed to the manual booking API. Dropdown loads syllabus_lessons sorted by
        lesson_number.
      interfaces:
        - "New prop or internal state: selectedSyllabusLessonId"
        - "Supabase query: syllabus_lessons ordered by lesson_number"

  dependencies:
    - component: CalDAV Client Library
      relationship: Used by CalDAV API routes and Netlify sync function
    - component: CalDAV Settings API
      relationship: Called by Admin CalDAV Settings UI; uses CalDAV Client Library
    - component: Netlify CalDAV Sync Function
      relationship: Uses CalDAV Client Library; reads/writes caldav_settings; reads/writes slots + bookings
    - component: Student Dashboard
      relationship: Reads bookings + slots + syllabus_lessons; depends on booking.syllabus_lesson_id FK
    - component: Admin Booking Planner Enhancement
      relationship: Posts to /api/admin/bookings/manual with syllabus_lesson_id; triggers CalDAV push + email
    - component: Lesson Scheduled Email
      relationship: Called by manual booking API route and Netlify sync function

  integration_points:
    - Admin manual booking API (/api/admin/bookings/manual) extended to accept syllabus_lesson_id, push to CalDAV, send email
    - AdminBookingPlanner.tsx sends syllabus_lesson_id in booking creation request body
    - Netlify caldav-sync function reads caldav_settings table for credentials and sync state
    - Student dashboard reads bookings joined with syllabus_lessons via syllabus_lesson_id FK
    - Email template integrated into both manual booking route and sync function

