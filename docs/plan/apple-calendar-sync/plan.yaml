    title: Create CalDAV admin API routes
    description: |
      Create 4 API routes under app/api/admin/caldav/:

      1. POST /api/admin/caldav/settings/route.ts:
         - Require admin auth (reuse requireAdmin pattern from manual booking route)
         - Accept body: {apple_id, app_specific_password, calendar_url?}
         - Upsert into caldav_settings (single row for single instructor)
         - Encrypt app_specific_password via Supabase RPC call to pgp_sym_encrypt
