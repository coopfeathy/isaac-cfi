  # ===================== WAVE 2: Core Logic =====================
  - id: task-2-caldav-lib
    title: Build CalDAV client library (lib/caldav.ts)
    description: |
      Create lib/caldav.ts with the following functions using the tsdav library:

      1. createCalDAVClient(settings: CalDAVSettings): Connect to iCloud CalDAV at caldav.icloud.com
         using Basic auth with apple_id and decrypted app_specific_password. Return initialized DAVClient.

      2. pushEventToCalendar(client, calendarUrl, slot, booking, studentName): Convert slot/booking
         data to VCALENDAR/VEVENT string. Use UID format: {slot.id}@merlinflight.com (matching existing
         .ics generation pattern). Set SUMMARY to "Flight Training - {studentName}" or
         "Discovery Flight - {studentName}". Include DESCRIPTION with booking notes, syllabus lesson
         title if linked. Use client.createCalendarObject() or updateCalendarObject() based on whether
         caldav_uid already exists on the slot. Return {etag, url} for storage.

      3. pullEventsFromCalendar(client, calendarUrl, syncToken?): Use client.syncCalendars() or
         fetchCalendarObjects() with ctag/etag comparison. If syncToken provided, use it for
         incremental sync. Return array of CalDAV events with UIDs + new syncToken.

      4. deleteCalendarEvent(client, eventUrl, etag): Delete a single event from iCloud calendar
         using client.deleteCalendarObject() with If-Match etag header.

      5. syncCalendar(settings): Orchestrate full bidirectional sync:
         a. Connect to iCloud via createCalDAVClient
         b. Push any slots with sync_status='pending_push'
         c. Pull changes from iCloud since last sync_token
         d. For each inbound event: match UID to slot.caldav_uid → update slot times/description
         e. For unmatched inbound events with merlinflight.com UID: log warning (orphaned)
         f. For deleted remote events: set slot.sync_status='conflict', do NOT auto-delete
         g. Update caldav_settings.sync_token and last_sync_at
         h. Return SyncResult with counts

      Export helper: slotToVEvent(slot, studentName, lessonTitle?) for reuse.
      Handle errors gracefully with typed error responses (connection, auth, parse, conflict).
    wave: 2
