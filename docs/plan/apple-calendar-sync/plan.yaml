  - id: task-2-sync-function
    title: Create Netlify scheduled CalDAV sync function
    description: |
      Create netlify/functions/caldav-sync.ts as a Netlify Scheduled Function:

      1. Export config with schedule: '*/10 * * * *' (every 10 minutes)
      2. Create Supabase client with service role key (existing pattern from booking-monitor.ts)
      3. Load caldav_settings where is_active = true
      4. If no active settings, exit early
      5. Call syncCalendar(settings) from lib/caldav.ts
      6. For inbound new events (not matching any slot caldav_uid):
         - Parse VEVENT SUMMARY to extract student name
         - Look up student by name match in profiles table
         - If found: create slot + booking (confirmed status) with caldav_uid
         - If not found: create slot only (unassigned), log warning
      7. For inbound modified events: update slot start_time/end_time/description
      8. For inbound deleted events: mark slot sync_status='conflict', log for admin review
      9. Push any slots with sync_status='pending_push' to iCloud
      10. Update caldav_settings.last_sync_at and sync_token
      11. Handle errors: log to console, update caldav_settings with error state

      Follow booking-monitor.ts structure for imports, config export, and Supabase client pattern.
      Keep function lightweight — exit early if ctag hasn't changed.
