plan_id: apple-calendar-sync
objective: Diagnose why CalDAV sync reports 0 pulled and bookings don't appear; locate email notification code for disabling
focus_area: caldav_sync_issues
created_at: "2026-04-05"
created_by: gem-researcher
status: completed

tldr: |
  - "0 pulled" root cause: pullEventsFromCalendar (lib/caldav.ts:247) FILTERS OUT any event whose UID does NOT end with `@merlinflight.com`. Events created manually in Apple Calendar have Apple-generated UIDs (e.g. `ABC123-DEF456@apple.com`), so they are silently skipped. Only events originally PUSHED from the app are ever pulled back.
  - The admin bookings tab (app/admin/page.tsx:2353) queries `bookings` joined with `slots(*)` but does NOT join `profiles` — it displays raw `user_id` UUIDs instead of student names.
  - The student-facing /bookings page (app/bookings/page.tsx) queries `bookings` filtered by `user_id = current user` — students only see their own bookings.
  - Email sending code is at netlify/functions/caldav-sync.ts lines 243-245 (call site) and 282-408 (sendLessonScheduledEmail function).
  - Student matching logic parses the calendar event SUMMARY for patterns like "Flight Training with <name>" and does ilike lookup against profiles.full_name.

research_metadata:
  methodology: "hybrid retrieval: semantic_search + grep_search + targeted read_file across caldav-sync, caldav lib, admin page, bookings page"
  scope: "Full examination of CalDAV sync pull logic, admin/bookings rendering, email notification pathway"
  confidence: high
  coverage: 95
  decision_blockers: 0
  research_blockers: 0

files_analyzed:
  - file: caldav-sync.ts
    path: netlify/functions/caldav-sync.ts
    purpose: Scheduled Netlify function (every 10 min) performing bidirectional CalDAV sync — push pending slots, delete pending, pull inbound changes
    key_elements:
      - element: pullEventsFromCalendar call
        type: function
        location: "netlify/functions/caldav-sync.ts:140"
        description: "Calls lib/caldav.ts pullEventsFromCalendar with calendar_url and sync_token from caldav_settings table"
      - element: Student matching from calendar summary
        type: pattern
        location: "netlify/functions/caldav-sync.ts:170-210"
        description: |
          Regex: /(?:Flight Training|Discovery Flight)\s*(?:with\s+|-\s*)?(.+?)(?:\s*\|.*)?$/i
          Extracts student name from SUMMARY field.
          First tries exact ilike match on profiles.full_name.
          Falls back to partial prefix match (first name only) via ilike `${name}%`.
      - element: Slot + booking creation for inbound events
        type: pattern
        location: "netlify/functions/caldav-sync.ts:214-252"
        description: |
          Creates a slot with type training/tour, price 20000/29900, is_booked based on matched user.
          If matchedUserId found → also creates a booking row with status 'confirmed' and notes 'Created from Apple Calendar sync'.
          If no matchedUserId → creates unassigned slot only (logged as unassigned).
      - element: sendLessonScheduledEmail call site
        type: function
        location: "netlify/functions/caldav-sync.ts:243"
        description: "Called immediately after creating a booking from inbound sync. Sends Resend email to matched student."
      - element: sendLessonScheduledEmail function definition
        type: function
        location: "netlify/functions/caldav-sync.ts:282-408"
        description: "Looks up profile, auth user email, slot times, optional syllabus lesson. Builds HTML email inline and sends via Resend."
    language: typescript
    lines: 408

  - file: caldav.ts
    path: lib/caldav.ts
    purpose: CalDAV client library wrapping tsdav — creates client, fetches calendars, pushes/pulls/deletes events
    key_elements:
      - element: pullEventsFromCalendar
        type: function
        location: "lib/caldav.ts:228-270"
        description: |
          Fetches calendar objects using tsdav. If syncToken provided, uses WebDAV sync-collection to get only changed objects.
          CRITICAL FILTER at line 247: `if (!uid || !uid.endsWith('@merlinflight.com')) continue`
          This means ONLY events with UIDs ending in @merlinflight.com are returned.
          Events created manually in Apple Calendar have Apple-generated UIDs and are ALWAYS SKIPPED.
      - element: slotToVEvent
        type: function
        location: "lib/caldav.ts:101-134"
        description: "Generates ICS VCALENDAR string. Sets UID as `${slot.id}@merlinflight.com` — this is the only UID format the pull filter accepts."
      - element: syncToken-based fetch
        type: pattern
        location: "lib/caldav.ts:234-237"
        description: |
          If syncToken exists in DB, passes it to fetchCalendarObjects for incremental sync.
          If null (first sync), fetches ALL calendar objects — but still filters by @merlinflight.com UID.
    language: typescript
    lines: 285

