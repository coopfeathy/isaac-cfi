  components_relevant_to_domain:
    - component: caldav-sync Netlify scheduled function
      responsibility: "Bidirectional sync every 10 min: push pending_push slots, delete pending_delete slots, pull inbound changes"
      location: netlify/functions/caldav-sync.ts
      relationship_to_domain: "Core sync engine"
    - component: caldav library
      responsibility: "tsdav wrapper for CalDAV operations — login, fetch calendars, push/pull/delete events"
      location: lib/caldav.ts
      relationship_to_domain: "Low-level CalDAV operations used by sync function"
    - component: Admin dashboard bookings tab
      responsibility: "Display all bookings with status management"
      location: "app/admin/page.tsx (lines 2352-2435)"
