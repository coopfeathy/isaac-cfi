    - component: Student bookings page
      responsibility: "Display student's own bookings"
      location: app/bookings/page.tsx
      relationship_to_domain: "Where students see their bookings"
  data_flow_involving_domain: |
    PUSH flow: slot created in app → slot.sync_status = 'pending_push' → caldav-sync picks it up → pushes to Apple Calendar → updates sync_status to 'synced'
    PULL flow: caldav-sync polls Apple Calendar → fetches changed objects → filters to @merlinflight.com UIDs only → matches student name from SUMMARY → creates slot + booking in DB
    The PULL flow breaks for manually-created Apple Calendar events because their UIDs don't match the filter.

