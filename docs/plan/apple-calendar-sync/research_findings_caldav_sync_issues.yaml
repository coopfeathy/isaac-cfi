answers:
  why_zero_pulled:
    primary_cause: |
      **The UID filter in lib/caldav.ts line 247 is the root cause.**

      `if (!uid || !uid.endsWith('@merlinflight.com')) continue`

      Events created manually in Apple Calendar get Apple-generated UIDs like
      `E621E1F8-C36C-495A-93FC-0C247A3E6E5F@apple.com` — these do NOT end
      with `@merlinflight.com` and are silently skipped.

      Only events originally PUSHED from the app (which have UIDs like
      `<slot-uuid>@merlinflight.com`) can ever be pulled back.
    secondary_cause: |
      If a sync_token already exists in the caldav_settings table from a prior sync,
      the pull uses incremental sync (WebDAV sync-collection). If no events have
      changed since the token was saved, the result is legitimately 0 objects returned
      by the server — before the UID filter even runs.
    combined_effect: |
      The instructor creates events in Apple Calendar → sync runs → fetches objects →
      UID filter rejects all of them → 0 pulled. OR: sync_token causes server to return
      0 changed objects → 0 pulled. Either way, nothing gets into the app.

  how_bookings_page_queries_data:
    student_facing: |
      app/bookings/page.tsx line 35-42:
      `supabase.from('bookings').select('*, slots(*)').eq('user_id', user.id)`
      Shows only the logged-in student's bookings, joined with slots for time/price.
    admin_facing: |
      app/admin/page.tsx line 383:
      `supabase.from('bookings').select('*, slots(*)').order('created_at', { ascending: false })`
      Shows ALL bookings with joined slot data. No sync_status filter. No profiles join.
      Bookings WOULD appear here IF they existed in the bookings table.

  admin_bookings_with_student_details:
    page: "app/admin/page.tsx bookings tab (line 2352-2435) or route /admin/bookings"
    limitation: |
      Does NOT show student names — only raw user_id UUIDs (line 2398).
      The query does not join the profiles table.
      To show student names, the query would need: `bookings.select('*, slots(*), profiles!bookings_user_id_fkey(full_name)')`

  email_sending_code:
    call_site:
      file: netlify/functions/caldav-sync.ts
      line: 243
      code: "await sendLessonScheduledEmail(supabase, matchedUserId, newSlot.id)"
    stats_increment:
      file: netlify/functions/caldav-sync.ts
      line: 244
      code: "stats.emailsSent++"
    function_definition:
      file: netlify/functions/caldav-sync.ts
      lines: "282-408"
      description: "sendLessonScheduledEmail — fetches profile, auth user email, slot, optional syllabus lesson, builds HTML, sends via Resend"
    simplest_disable_method: |
      Comment out the two lines at 243-244:
        // await sendLessonScheduledEmail(supabase, matchedUserId, newSlot.id)
        // stats.emailsSent++
      Or add a feature flag check: `if (process.env.SEND_SYNC_EMAILS !== 'false') { ... }`

  student_matching_logic:
    location: "netlify/functions/caldav-sync.ts lines 170-210"
    mechanism: |
      1. Extracts student name from the calendar event SUMMARY field using regex:
         /(?:Flight Training|Discovery Flight)\s*(?:with\s+|-\s*)?(.+?)(?:\s*\|.*)?$/i

      2. Supported SUMMARY formats:
         - "Flight Training with George"
         - "Flight Training - George"
         - "Flight Training George"
         - "Discovery Flight with Sam"
         - "Discovery Flight - Sam | Lesson 5: ..."

      3. Tries exact ilike match: profiles.full_name ilike 'George'
      4. Falls back to prefix match: profiles.full_name ilike 'George%'
      5. If no match found → slot is created but no booking (unassigned slot)
