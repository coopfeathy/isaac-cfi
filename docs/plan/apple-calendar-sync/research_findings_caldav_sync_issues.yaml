patterns_found:
  - category: architecture
    pattern: "UID-based event filtering — only merlinflight.com UIDs processed"
    description: |
      The pull logic in lib/caldav.ts line 247 enforces that only events originally
      created by the app (with UIDs matching `*@merlinflight.com`) are pulled back.
      This is a deliberate design choice for round-trip sync of app-created events,
      but it completely prevents ingesting events created manually in Apple Calendar.
    examples:
      - file: lib/caldav.ts
        location: "lib/caldav.ts:247"
        snippet: "if (!uid || !uid.endsWith('@merlinflight.com')) continue"
    prevalence: common

  - category: architecture
    pattern: "Sync token incremental sync"
    description: |
      When a sync_token exists in caldav_settings, the pull uses WebDAV sync-collection
      to fetch only CHANGED objects since that token. If all events are unchanged since
      last sync, this correctly returns 0 objects. On first sync (null token), ALL
      objects are fetched — but still filtered by the @merlinflight.com UID check.
    examples:
      - file: lib/caldav.ts
        location: "lib/caldav.ts:234-237"
        snippet: |
          if (syncToken) {
            fetchOptions.syncToken = syncToken
          }
    prevalence: common

  - category: architecture
    pattern: "Admin bookings view shows raw UUID not student name"
    description: |
      The admin bookings tab queries `bookings` with `slots(*)` join but does NOT
      join the `profiles` table. It displays `booking.user_id` as a raw UUID string
      instead of resolving to a human-readable student name.
    examples:
      - file: app/admin/page.tsx
        location: "app/admin/page.tsx:2398"
        snippet: '{booking.user_id && <p className="text-gray-600">Customer ID: {booking.user_id}</p>}'
    prevalence: common

  - category: error_handling
    pattern: "Silent skip of non-matching events"
    description: |
      Events that don't match the @merlinflight.com UID filter are silently skipped
      with no logging. The sync reports "0 pulled" which gives no indication that
      events were found but filtered out. This makes debugging difficult.
    examples:
      - file: lib/caldav.ts
        location: "lib/caldav.ts:247"
        snippet: "if (!uid || !uid.endsWith('@merlinflight.com')) continue"
    prevalence: common

