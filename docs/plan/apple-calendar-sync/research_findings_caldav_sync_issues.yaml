    context: |
      The PRD user story says 'Schedule students on my Apple Calendar and have it automatically appear in their dashboard'.
      The current UID filter prevents this. The filter was likely added to avoid pulling non-flight-related personal calendar events,
      but it also blocks the primary instructor workflow of creating events directly in Apple Calendar.
    type: decision_blocker
    affects: ["caldav-pull-logic"]

  - question: "Should the admin bookings view resolve user_id to student names?"
