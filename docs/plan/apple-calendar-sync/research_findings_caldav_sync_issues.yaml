gaps:
  - area: "No logging of skipped events during pull"
    description: |
      When pullEventsFromCalendar skips events due to UID filter, there is no log output.
      Adding a log like 'Skipping event with non-merlinflight UID: <uid>' would make debugging
      the '0 pulled' issue immediately obvious.
    impact: nice_to_know
    affects: ["caldav-debugging"]

  - area: "caldav_settings.sync_token state unknown"
    description: |
      If sync_token is already set from a previous successful sync, the pull will only fetch
      CHANGED events since that token. If no events changed since the token was set, result is
      legitimately 0 pulled. Cannot determine from code alone whether sync_token is null or populated.
    impact: research_blocker
    affects: ["caldav-pull-diagnosis"]

