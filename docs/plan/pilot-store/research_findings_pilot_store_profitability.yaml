# =============================================================================
# SECTION 6: COMPETITIVE LANDSCAPE
# =============================================================================

competitive_landscape:
  online_retailers:
    - name: "Sporty's (sportys.com)"
      location: "Batavia, OH"
      strengths: "62+ year brand, 200K+ course users, free shipping on $100+, own airport"
      model: "Direct retail + dealer program for flight schools"
      dealer_program: "30-40% off, free to join, in-person sales only"
      relevance: "Best wholesale partner for Merlin"

    - name: "PilotMall.com"
      location: "Cartersville, GA"
      strengths: "Large Shopify store, own brands (Aeroplane Apparel, High Flying Models), free shipping $100+"
      model: "Direct retail + affiliate program"
      affiliate_program: "UpPromote-based commission program"
      relevance: "Good affiliate partner for items not available via Sporty's dealer"

    - name: "MyPilotStore.com"
      location: "Arizona"
      strengths: "Since 1997, 110% price guarantee, large selection"
      model: "Direct retail"
      relevance: "Price benchmark competitor—offers group/quantity pricing"

    - name: "Amazon"
      strengths: "Fast shipping, broad selection, Prime loyalty"
      weakness: "No aviation expertise, often gray market for aviation-specific items"
      relevance: "Primary price competitor. Amazon affiliate commissions are only 1-4% on electronics."

  local_competitors:
    notes: |
      Republic Airport (FRG) is a busy GA airport in Farmingdale, Long Island, NY.
      Other flight schools and FBOs at FRG may have their own supply arrangements.
      Research needed: Do any other FRG-based schools sell pilot supplies?
      Proximity to NYC metro area means students have easy access to online 
      ordering with fast shipping—reduces urgency of in-person store.

