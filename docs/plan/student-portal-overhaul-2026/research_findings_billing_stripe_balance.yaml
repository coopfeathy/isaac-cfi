domain_security_considerations:
  sensitive_areas:
    - area: Balance manipulation
      location: app/manage/adjustments/page.tsx:L47-L52
      concern: "Non-atomic read-modify-write for balance_cents. Block account system MUST use atomic SQL update (SET balance_cents = balance_cents + X) to prevent race conditions and double-crediting."
    - area: Webhook signature verification
      location: app/api/stripe-webhook/route.ts:L230-L243
      concern: "Properly verifies webhook signature using stripe.webhooks.constructEvent. Block account webhook branch must be inside this verified handler."
    - area: Preset amount validation
      location: "(new code needed)"
      concern: "Block account purchase endpoint must validate amount is exactly one of the preset values ($500/$1000/$2000/$5000 = 50000/100000/200000/500000 cents) server-side. Never trust client-submitted arbitrary amounts."
    - area: Admin-only deduction
      location: "(new code needed)"
      concern: "Balance deduction API must enforce admin auth check (same pattern as existing admin routes: requireAdmin function). Students must NOT be able to deduct their own balance."
    - area: Balance overdraft prevention
      location: "(new code needed)"
      concern: "Deduction must check balance_cents >= deduction_amount atomically in SQL WHERE clause to prevent negative balances."
  authentication_patterns_in_domain: "API routes use JWT from Authorization header + profiles.is_admin check via requireAdmin() helper. Webhook uses Stripe signature verification."
  authorization_patterns_in_domain: "Admin-only: billing routes check is_admin via profiles table. Student-facing: slot booking uses userId from request body (validate matches auth). Webhook: service_role bypass for all DB writes."
  data_validation_in_domain: "Amount validation: Number.isFinite checks, minimum amount guards, cents rounding. Input sanitization: string type checks, trim(), early returns on missing fields."

open_questions:
  - question: Should block account payments go through Stripe Connect payout splits?
    context: "PRD lists this as open (needs_clarification). Current payment flows route funds via Connect destination charges or split transfers. Block account purchases are lump-sum credits — unclear if the flight school owner (Connect destination) should receive the funds immediately or only when the balance is spent."
    type: decision_blocker
    affects: ["block-account-purchase-api", "webhook-balance-credit"]

gaps:
  - area: Atomic balance operations
    description: "Existing balance_cents updates use non-atomic read-modify-write pattern. Block account system needs atomic SQL: UPDATE profiles SET balance_cents = balance_cents + $1 WHERE id = $2 RETURNING balance_cents. Supabase JS client may need .rpc() call to a Postgres function for atomic increment/decrement."
    impact: research_blocker
    affects: ["block-account-purchase-api", "admin-deduction-api", "low-balance-alert"]
  - area: No existing Stripe Elements integration for student-facing payments (non-slot)
    description: "The PaymentForm.tsx is legacy (raw card inputs). Actual Stripe Elements integration exists in the slot booking page but not as a reusable component. Block account purchase page will need its own Stripe Elements checkout UI."
    impact: nice_to_know
    affects: ["block-account-ui"]
  - area: Low balance threshold calculation
    description: "PRD says 'when ~1 flight session remaining based on average cost'. Need to determine: average of all items on student's training_item_ids? Or fixed threshold? Aircraft rate + instructor rate for 1.5 hours? This affects the SMS trigger logic."
    impact: research_blocker
    affects: ["low-balance-alert"]
  - area: Student phone number for SMS alerts
    description: "sendTwilioMessage needs a 'to' phone number. Students have phone in both profiles.phone and students.phone. Need to determine which source to use and whether it's reliably populated."
    impact: nice_to_know
    affects: ["low-balance-alert"]
