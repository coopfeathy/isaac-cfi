plan_id: student-portal-overhaul-2026
objective: |
  Complete Student Portal Overhaul for Merlin Flight Training — a Next.js + Supabase + Stripe flight school app.
  Deliver block account purchasing, appointment request flow with cost estimation, backup queue with SMS notifications,
  a dedicated student portal layout with dashboard (flights, balance, progress, evaluations, METAR weather),
  admin balance deduction, and low-balance SMS alerts.
created_at: "2026-04-04"
created_by: gem-planner
status: pending_approval
research_confidence: high

plan_metrics:
  wave_1_task_count: 2
  total_dependencies: 23
  risk_score: medium

tldr: |
  6-wave plan to overhaul the student portal for Merlin Flight Training.
  Wave 1: Database migrations (5 new tables: appointment_requests, backup_queue, balance_transactions, day_availability_subscriptions, bulk_hour_ledger + RLS policies).
  Wave 2: API routes (block purchase [no Stripe Connect — 100% to Isaac], appointment requests, backup queue + day-based subscriptions, METAR proxy [hourly :55 cache], admin balance deduction + bulk hour auto-deduction, bulk hours admin API, day subscriptions API).
  Wave 3: Portal layout shell, portal nav, auth routing (conditional root layout).
  Wave 4: Dashboard page, billing page, schedule page with request flow + cost estimator.
  Wave 5: Backup queue notification system (Twilio SMS chain, timeout logic, day-based notifications for open days, low-balance alerts).
  Wave 6: Integration review + security audit.

open_questions: [] # All resolved in planning pass 2:
  # 1. Block purchase → NO Stripe Connect splits, 100% to Isaac's Stripe account (simple PaymentIntent)
  # 2. Students CAN cancel backup queue (DELETE handler, status='withdrawn') + day-based notifications added
  # 3. METAR refreshes hourly aligned to :55 mark (when new METARs publish)

pre_mortem:
  overall_risk_level: medium
  critical_failure_modes:
    - scenario: Stripe webhook fails to credit balance_cents after block purchase
      likelihood: medium
      impact: critical
      mitigation: |
        Add idempotency key to webhook handler. Log all webhook events to balance_transactions.
        Add retry logic and dead-letter tracking. Verify with Stripe CLI webhook testing.
    - scenario: Backup queue timeout logic fires incorrectly or out-of-order
      likelihood: medium
      impact: high
      mitigation: |
        Use database timestamps for timeout calculations rather than in-memory timers.
        Process queue sequentially by position. Add guard checks before sending SMS.
        Log all state transitions in backup_queue table.
    - scenario: Root layout conditional rendering breaks marketing site or portal
      likelihood: medium
      impact: high
      mitigation: |
        Use Next.js route groups. Portal routes under /app/portal/ get their own layout.tsx.
        Root layout renders SimpleHeader/Footer unconditionally — portal layout.tsx overrides with its own shell.
        This avoids conditional logic in root layout entirely.
    - scenario: Race condition on balance deduction — two admins deduct simultaneously
      likelihood: low
      impact: high
      mitigation: |
        Use Supabase RPC with row-level locking (SELECT FOR UPDATE) on profiles.balance_cents.
        Return error if resulting balance < 0.
    - scenario: METAR API (aviationweather.gov) is down or rate-limited
      likelihood: low
      impact: low
      mitigation: |
        Cache responses server-side with TTL aligned to :55 of the hour. Show "Weather unavailable" gracefully.
        Use a Next.js API route as proxy to avoid CORS and protect API usage.
    - scenario: Bulk hour ledger gets out of sync with actual flight deductions
      likelihood: medium
      impact: high
      mitigation: |
        Auto-deduction is triggered atomically alongside balance_transactions in task-2-5.
        Ledger SUM query is the source of truth. Admin can manually add correction entries.
        Remaining hours check happens immediately after deduction.
    - scenario: Day-based SMS notifications flood students when many slots open at once
      likelihood: low
      impact: medium
      mitigation: |
        Debounce or batch day-based notifications. Only notify if last notification was > 1 hour ago.
        Students can unsubscribe from specific days via DELETE /api/day-subscriptions.
  assumptions:
    - Existing balance_cents column on profiles table is integer (cents) and defaults to 0
    - Twilio is fully configured with TWILIO_ACCOUNT_SID, TWILIO_AUTH_TOKEN, TWILIO_FROM_NUMBER
    - Stripe secret key and webhook signing secret are configured (NO Stripe Connect needed for block purchases)
    - Students have phone numbers stored in profiles (required for SMS features)
    - aviationweather.gov METAR API is free and does not require an API key
    - Supabase RLS is enforced and service-role key is available server-side
    - Admin phone number is available in env or profiles table for low-bulk-hours SMS alerts
    - METARs are published around :55 of each hour by aviationweather.gov

implementation_specification:
  code_structure: |
    New portal routes under /app/portal/ with dedicated layout (no SimpleHeader/Footer).
    New API routes under /app/api/ following existing patterns (NextRequest/NextResponse, supabase-admin).
    Database migrations as SQL files in /supabase/.
    Shared types extended in /lib/supabase.ts.
    Twilio helper reused from /lib/twilio.ts.
    Stripe payment flow follows existing create-payment-intent + stripe-webhook pattern.
  affected_areas:
    - /supabase/ — new migration SQL files for tables and RLS
    - /app/api/ — new API routes for block purchase, appointment requests, backup queue, METAR, balance deduction, bulk hours, day subscriptions
    - /app/portal/ — entirely new route group with layout, nav, dashboard, billing, schedule pages
    - /app/layout.tsx — NO changes (portal layout overrides via route group)
    - /lib/supabase.ts — new TypeScript interfaces for new tables (5 tables total)
    - /app/api/stripe-webhook/route.ts — extend to handle block purchase payment intents (no Stripe Connect)
  component_details:
    - component: Database Schema (migrations)
      responsibility: Create appointment_requests, backup_queue, balance_transactions, day_availability_subscriptions, bulk_hour_ledger tables with proper indexes and RLS
      interfaces:
        - "appointment_requests: id, user_id, aircraft_id, instructor_id, requested_date, requested_start_time, duration_minutes, estimated_cost_cents, status, admin_notes, created_at"
        - "backup_queue: id, schedule_id, user_id, position, status (waiting/notified/confirmed/expired/withdrawn), notified_at, expires_at, created_at"
        - "balance_transactions: id, user_id, amount_cents, type (credit/debit), source (block_purchase/admin_deduction/refund), description, related_booking_id, stripe_payment_intent_id, created_by, created_at"
        - "day_availability_subscriptions: id, user_id, day_of_week (0-6), is_active, created_at — UNIQUE(user_id, day_of_week)"
        - "bulk_hour_ledger: id, type (purchase/deduction), hours, cost_per_hour_cents, total_cost_cents, description, related_balance_transaction_id, student_user_id, created_by, created_at"
    - component: Block Account API
      responsibility: Create Stripe PaymentIntent (simple, no Connect) for preset block amounts, handle webhook to credit balance
      interfaces:
        - "POST /api/block-purchase — creates simple PaymentIntent for $500/$1000/$2000/$5000 (NO destination, NO application_fee)"
        - "Webhook handler extension — credits balance_cents and logs to balance_transactions on payment success"
    - component: Appointment Request API
      responsibility: CRUD for appointment requests with cost estimation, admin approve/deny
      interfaces:
        - "POST /api/appointment-requests — student creates request with duration, returns cost estimate"
        - "PATCH /api/appointment-requests — admin approves/denies request"
        - "GET /api/appointment-requests — list requests (filtered by user or all for admin)"
    - component: Backup Queue API
      responsibility: Join queue, process cancellations, manage timeout chain
      interfaces:
        - "POST /api/backup-queue — student joins queue for a schedule/slot"
        - "POST /api/backup-queue/process — triggered on cancellation, notifies first in queue"
        - "POST /api/backup-queue/timeout — handles 15-min expiry, advances to next"
    - component: Admin Balance Deduction API
      responsibility: Deduct from student balance based on actual Hobbs time, auto-deduct bulk hours, alert on low hours
      interfaces:
        - "POST /api/admin/balance-deduction — accepts user_id, hobbs_hours, aircraft_id, instructor_id, calculates and deducts"
        - "Auto-inserts deduction entry into bulk_hour_ledger for Hobbs hours consumed"
        - "Sends SMS to admin if remaining bulk hours < 10 after deduction"
    - component: Bulk Hour Inventory API
      responsibility: Admin logs bulk aircraft hour purchases and views remaining hours
      interfaces:
        - "POST /api/admin/bulk-hours — admin logs a new bulk hour purchase (hours, cost_per_hour, date, notes)"
        - "GET /api/admin/bulk-hours — returns ledger entries + computed remaining hours (SUM of all hours)"
    - component: Day Availability Subscriptions API
      responsibility: Students subscribe to days of the week for slot-open SMS notifications
      interfaces:
        - "POST /api/day-subscriptions — student subscribes to a day_of_week"
        - "GET /api/day-subscriptions — returns student's active subscriptions"
        - "DELETE /api/day-subscriptions — student unsubscribes from a day"
    - component: METAR Weather API
      responsibility: Proxy aviation weather data to avoid CORS, with caching
      interfaces:
        - "GET /api/metar?station=KFRG — returns decoded METAR for given station"
    - component: Portal Layout
      responsibility: Dedicated layout shell for logged-in students with portal navigation
      interfaces:
        - "PortalLayout — wraps all /portal/* routes, includes PortalNav, no SimpleHeader/Footer"
        - "PortalNav — sidebar/topbar with links: Dashboard, Schedule, Billing, Progress, Bookings"
    - component: Dashboard Page
      responsibility: Student home with widgets for upcoming flights, balance, progress summary, recent evaluations, METAR
      interfaces:
        - "Server component fetching from Supabase, METAR client component for weather"
    - component: Billing Page
      responsibility: Balance display, transaction history, block purchase buttons
      interfaces:
        - "Shows balance_cents formatted as dollars, lists balance_transactions, preset purchase CTAs"
    - component: Schedule Request Page
      responsibility: Calendar + request form with cost estimator replacing direct booking for training flights
      interfaces:
        - "Duration selector, date/time picker, real-time cost estimate, backup queue join button"
  dependencies:
    - component: Block Account API
      relationship: Extends stripe-webhook handler; writes to balance_transactions and profiles.balance_cents
    - component: Appointment Request API
      relationship: Reads aircraft.rate_per_hour_cents and instructor_details.rate_per_hour_cents for cost estimation
    - component: Backup Queue API
      relationship: Calls lib/twilio.ts sendTwilioMessage; reads profiles for phone numbers
    - component: Portal Layout
      relationship: Uses AuthContext for auth state; renders portal nav components
    - component: Dashboard Page
      relationship: Reads from schedules, profiles, student_syllabus_progress, lesson_evaluations, METAR API
    - component: Billing Page
      relationship: Reads balance_transactions; calls block-purchase API
    - component: Admin Balance Deduction API
      relationship: Uses Supabase RPC for atomic balance update; writes balance_transactions; writes bulk_hour_ledger deduction entry
    - component: Bulk Hour Inventory API
      relationship: Reads/writes bulk_hour_ledger; admin-only access via supabase-admin
    - component: Day Availability Subscriptions API
      relationship: Reads/writes day_availability_subscriptions; called from backup queue process flow for day-based notifications
  integration_points:
    - Stripe webhook handler extended with block_purchase metadata detection (simple PaymentIntent, no Connect)
    - Root layout unchanged — portal uses its own layout via Next.js route group
    - AuthContext consumed by portal layout for auth gating
    - Twilio SMS called from backup queue process, day-based notifications, low-balance alert, and low-bulk-hours admin alert
    - Supabase RLS policies gate student access to own data only
    - Backup queue process falls through to day_availability_subscriptions when slot-specific queue is exhausted
    - Admin balance deduction auto-deducts bulk_hour_ledger and checks remaining hours

