    title: Build backup queue API
    description: |
      Create /app/api/backup-queue/route.ts with POST and GET handlers:

      POST handler (student joins queue):
      - Accepts { scheduleId, userId }
      - Validates: schedule exists and is booked, user not already in queue
      - Calculates position as MAX(position) + 1 for that schedule_id
      - Inserts into backup_queue with status='waiting'
      - Returns { id, position, status }

      GET handler:
      - Student: returns own queue entries with schedule details
      - Admin: returns all entries for a given schedule_id

      DELETE handler:
      - Student can withdraw from queue (set status='withdrawn')

      Create /app/api/backup-queue/process/route.ts (POST):
      - Called when a booking is canceled (will be triggered from cancellation flow)
      - Finds first 'waiting' entry for the schedule_id (ORDER BY position ASC)
      - Updates status to 'notified', sets notified_at=now(), expires_at=now()+15min
      - Sends SMS via Twilio: "A flight slot opened up on [date/time]! Reply YES to confirm within 15 minutes."
      - Returns { notified_user_id, position }

      Create /app/api/backup-queue/timeout/route.ts (POST):
      - Called by cron/edge function when expires_at is reached
      - If status still 'notified' (no confirmation), set status='expired'
      - Call process endpoint logic to notify next in queue
      - Returns { expired_user_id, next_notified_user_id }

      Use lib/twilio.ts sendTwilioMessage for SMS.
