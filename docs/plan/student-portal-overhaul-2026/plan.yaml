tasks:
  # ============================================================
  # WAVE 1: Database migrations, new tables, RLS policies
  # ============================================================
  - id: task-1-1
    title: Create database migrations for new tables and RLS policies
    description: |
      Create SQL migration file(s) in /supabase/ with:

      1. `appointment_requests` table:
         - id (uuid, PK, default gen_random_uuid())
         - user_id (uuid, FK to auth.users, NOT NULL)
         - aircraft_id (uuid, FK to aircraft, nullable — default aircraft if null)
         - instructor_id (uuid, FK to instructor_details, nullable)
         - requested_date (date, NOT NULL)
         - requested_start_time (time, NOT NULL)
         - duration_minutes (integer, NOT NULL, CHECK 30-480)
         - estimated_cost_cents (integer, NOT NULL)
         - status (text, NOT NULL, default 'requested', CHECK in requested/approved/denied/canceled/completed)
         - admin_notes (text, nullable)
         - created_at (timestamptz, default now())
         - updated_at (timestamptz, default now())

      2. `backup_queue` table:
         - id (uuid, PK, default gen_random_uuid())
         - schedule_id (uuid, FK to schedules, NOT NULL)
         - user_id (uuid, FK to auth.users, NOT NULL)
         - position (integer, NOT NULL)
         - status (text, NOT NULL, default 'waiting', CHECK in waiting/notified/confirmed/expired/withdrawn)
         - notified_at (timestamptz, nullable)
         - expires_at (timestamptz, nullable)
         - created_at (timestamptz, default now())
         - UNIQUE(schedule_id, user_id) to prevent duplicate queue entries

      3. `balance_transactions` table:
         - id (uuid, PK, default gen_random_uuid())
         - user_id (uuid, FK to auth.users, NOT NULL)
         - amount_cents (integer, NOT NULL) — positive for credits, negative for debits
         - type (text, NOT NULL, CHECK in credit/debit)
         - source (text, NOT NULL, CHECK in block_purchase/admin_deduction/refund)
         - description (text, nullable)
         - related_booking_id (uuid, FK to bookings, nullable)
         - stripe_payment_intent_id (text, nullable)
         - created_by (uuid, FK to auth.users, nullable) — admin who performed deduction
         - created_at (timestamptz, default now())

      4. `day_availability_subscriptions` table (NEW — day-based slot notifications):
         - id (uuid, PK, default gen_random_uuid())
         - user_id (uuid, FK to auth.users, NOT NULL)
         - day_of_week (integer, NOT NULL, CHECK 0-6, Sunday=0)
         - is_active (boolean, NOT NULL, default true)
         - created_at (timestamptz, default now())
         - UNIQUE(user_id, day_of_week) to prevent duplicate subscriptions

      5. `bulk_hour_ledger` table (NEW — aircraft bulk hour inventory tracking):
         - id (uuid, PK, default gen_random_uuid())
         - type (text, NOT NULL, CHECK in purchase/deduction)
         - hours (decimal(10,2), NOT NULL) — positive for purchases, negative for deductions
         - cost_per_hour_cents (integer, nullable — only for purchases)
         - total_cost_cents (integer, nullable — only for purchases)
         - description (text, nullable)
         - related_balance_transaction_id (uuid, FK to balance_transactions, nullable — links to student flight deduction)
         - student_user_id (uuid, FK to auth.users, nullable — which student's flight triggered deduction)
         - created_by (uuid, FK to auth.users, NOT NULL)
         - created_at (timestamptz, default now())

      6. Supabase RPC function `deduct_balance`:
         - Accepts: p_user_id uuid, p_amount_cents integer
         - Uses SELECT FOR UPDATE on profiles row
         - Returns new balance or raises error if insufficient funds
         - Atomic transaction

      7. RLS policies:
         - appointment_requests: students SELECT own rows, INSERT own rows; admins full access
         - backup_queue: students SELECT/INSERT/DELETE own rows; admins full access
         - balance_transactions: students SELECT own rows; admins full access (INSERT via service role)
         - day_availability_subscriptions: students SELECT/INSERT/UPDATE/DELETE own rows; admins full access
         - bulk_hour_ledger: admin-only full access (no student access)

      8. Indexes:
         - appointment_requests: (user_id), (status), (requested_date)
         - backup_queue: (schedule_id, position), (user_id)
         - balance_transactions: (user_id, created_at DESC)
         - day_availability_subscriptions: (day_of_week, is_active) for querying subscribers by day
         - bulk_hour_ledger: (type), (created_at DESC)

      Reference existing patterns in /supabase/RULES.sql and /supabase/SETUP.sql.
    wave: 1
    agent: gem-implementer
    prototype: false
    covers:
      - "Student can purchase a block account with preset amounts via Stripe"
      - "Admin can deduct balance based on actual Hobbs time"
      - "Student can join backup queue for a booked slot"
      - "Student can subscribe to day-of-week availability notifications"
      - "Admin can track bulk aircraft hour inventory"
    priority: high
    status: pending
    dependencies: []
    conflicts_with: []
    context_files:
      - path: supabase/SETUP.sql
        description: Existing database setup — reference for table patterns, column types, FK conventions
      - path: supabase/RULES.sql
        description: Existing RLS policies — reference for policy naming and structure
      - path: lib/supabase.ts
        description: Existing TypeScript types — will need new interfaces in task-1-2
      - path: docs/PRD.yaml
