  - id: task-5-1
    title: Implement backup queue SMS notification chain and cancellation integration
    description: |
      Wire up the full backup queue notification flow:

      1. **Cancellation trigger** — When a booking is canceled (via existing or new cancellation UI):
         - Check if appointment is > 24 hrs away (enforce 24hr cancellation window)
         - If < 24 hrs: reject cancellation with ERR_APPT_002
         - If > 24 hrs: mark booking as canceled, then call POST /api/backup-queue/process for that schedule_id

      2. **SMS notification content**:
         - First notification: "Hey {name}! A flight slot just opened up on {date} at {time} at Merlin Flight Training. Reply YES within 15 minutes to claim it, or it'll go to the next student."
         - Confirmation response handling: Create /app/api/twilio-webhook/route.ts to receive SMS replies
           - Parse incoming SMS for "YES" (case-insensitive)
           - Match to pending backup_queue entry via phone number
           - If YES within 15 min: set status='confirmed', create booking, notify student via SMS
           - If timeout: /api/backup-queue/timeout handles expiry and next notification

      3. **Timeout processing**:
         - Create a Supabase Edge Function or Next.js API route callable via cron
         - Query backup_queue WHERE status='notified' AND expires_at < now()
         - For each expired entry: set status='expired', process next in queue
         - Cron interval: every 1 minute

      4. **Day-based availability notifications** (after backup queue exhausted or no queue):
         - When a slot opens (cancellation processed through backup queue, or new slot created):
         - After backup queue is processed (all confirmed/expired/withdrawn), check day_availability_subscriptions
         - Query subscribers WHERE day_of_week matches the slot's day AND is_active=true
         - Exclude: the student who canceled, any student already in the backup queue for that slot
         - Debounce: only notify if student's last day-notification was > 1 hour ago
         - SMS: "Hey {name}! A flight slot just opened up on {day_name} ({date}) at Merlin Flight Training. Check your portal to request it: {portal_url}/schedule"
         - Log notification sent (to support debounce check)

      5. **Low-balance SMS alert** (triggered from task-2-5 balance deduction):
         - Already handled in task-2-5, but verify integration here
         - Message: "Hi {name}, your Merlin Flight Training balance is ${balance}. That's less than one flight session. Top up at {portal_url}/billing"

      Use lib/twilio.ts for all SMS sending.
      Twilio webhook must verify request signature for security.
