  - id: task-2-5
    title: Build admin balance deduction API
    description: |
      Create /app/api/admin/balance-deduction/route.ts with POST handler:

      - Admin-only (verify is_admin from profile)
      - Accepts { userId, hobbsHours, aircraftId, instructorId, notes? }
      - Looks up aircraft.rate_per_hour_cents and instructor_details.rate_per_hour_cents
      - Calculates deduction: (aircraft_rate + instructor_rate) × hobbsHours (in cents)
      - Calls Supabase RPC deduct_balance(p_user_id, p_amount_cents)
      - On success:
        1. Inserts balance_transactions record (type: 'debit', source: 'admin_deduction', created_by: admin user id)
        2. Auto-inserts bulk_hour_ledger deduction entry (type: 'deduction', hours: -hobbsHours, student_user_id, related_balance_transaction_id)
        3. Queries remaining bulk hours: SELECT SUM(hours) FROM bulk_hour_ledger
        4. If remaining bulk hours < 10: send SMS to admin (ADMIN_PHONE env var) warning of low inventory
      - Returns { new_balance_cents, deducted_cents, transaction_id, remaining_bulk_hours }
      - On insufficient funds: returns 400 with ERR_BLOCK_002 message
      - After successful deduction: check if new balance < 1 avg session cost (~$250×100 = 25000 cents)
        - If yes, trigger low-balance SMS alert to student via Twilio
    wave: 2
