    title: Add TypeScript interfaces for new database tables
    description: |
      Extend /lib/supabase.ts with TypeScript interfaces for all five new tables:

      1. `AppointmentRequest` interface matching appointment_requests table columns
      2. `BackupQueueEntry` interface matching backup_queue table columns
