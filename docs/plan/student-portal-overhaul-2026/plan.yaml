  # ============================================================
  # WAVE 2: API routes
  # ============================================================
  - id: task-2-1
    title: Build block account purchase API and extend Stripe webhook
    description: |
      Create POST /app/api/block-purchase/route.ts:
      - Accepts { amount, userId } where amount is one of 50000/100000/200000/500000 (cents)
      - Validates preset amounts (reject arbitrary values)
      - Creates a SIMPLE Stripe PaymentIntent (NO Stripe Connect destination charge, NO application_fee)
        - All funds go to Isaac's main Stripe account
        - No developer commission on block purchases
      - metadata: { type: 'block_purchase', userId, amount }
      - Adds 3.5% processing fee to total (matching existing pattern)
      - Returns { clientSecret } for frontend Stripe Elements

      Extend /app/api/stripe-webhook/route.ts:
      - Detect metadata.type === 'block_purchase' on payment_intent.succeeded
      - Credit profiles.balance_cents using supabase-admin (atomic update)
      - Insert balance_transactions record (type: 'credit', source: 'block_purchase')
      - Send confirmation email via Resend (follow existing sendBookingEmail pattern)
      - SKIP all Stripe Connect split/transfer logic for block_purchase type

      Follow existing patterns: Stripe init, supabase-admin usage, error responses.
      Do NOT use resolveStripeConnectConfig() or any Connect routing for this payment type.
