  - id: task-2-2
    title: Build appointment request API with cost estimation
    description: |
      Create /app/api/appointment-requests/route.ts with GET and POST handlers:

      POST handler (student creates request):
      - Accepts { userId, requestedDate, requestedStartTime, durationMinutes, aircraftId?, instructorId?, notes? }
      - Validates: authenticated user, valid date/time, duration 30-480 min
      - Calculates estimated_cost_cents:
        - Aircraft rate from aircraft.rate_per_hour_cents (default $185/hr = 18500 cents)
        - Instructor rate from instructor_details.rate_per_hour_cents (default $65/hr = 6500 cents)
        - Total = (aircraft_rate + instructor_rate) × (duration_minutes / 60)
      - Inserts into appointment_requests with status='requested'
      - Sends admin notification email (follow slot-requests alert email pattern)
