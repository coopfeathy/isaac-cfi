# =============================================================================
# SECTION 7: LOGISTICS
# =============================================================================
logistics:
  dropshipping_vs_inventory:
    recommendation: "Hybrid approach"
    details:
      dropshipping:
        use_for: "Headsets, iPads, specialized aviation equipment"
        why: "High unit cost items tie up too much capital. Headset models change. Returns are complex."
        sources: "PilotMall affiliate program, MyPilotStore dealer account, Amazon affiliate for iPads"
        pros:
          - "Zero inventory risk"
          - "No upfront capital requirement"
          - "Always current models"
        cons:
          - "Lower margins (affiliate commission 5–15% vs wholesale markup 25–40%)"
          - "No control over shipping speed"
          - "Can't do custom unboxing experience"

      stocked_inventory:
        use_for: "Small supplies (logbooks, plotters, E6-Bs, fuel testers, pens, flashlights), branded merchandise"
        why: "Low cost per unit, high margin, easy to store, rarely obsolete"
        storage: "Can fit in a closet or small shelf at Republic Airport (FRG)"
        estimated_initial_investment: "$500–$1,500 for initial stock of supplies + merch"
        pros:
          - "Immediate delivery (hand to student at lesson)"
          - "Custom packaging/unboxing experience"
          - "Higher margins"
          - "Create a 'starter kit' box for that premium feel"
        cons:
          - "Small capital outlay"
          - "Need to track inventory"
          - "Some items expire annually (FAR/AIM)"

      print_on_demand:
        use_for: "All branded merchandise (hats, shirts, stickers, bags)"
        why: "Zero inventory. Ships direct to customer. Test designs risk-free."
        notes: "Once volume justifies it (>50 units/month of a single item), switch that item to bulk ordering."

  shipping_considerations:
    local_pickup: "PREFERRED — students come to the airport for lessons. Hand them the kit in person."
    shipping_option: "Offer USPS Priority Mail for non-local students or online-only orders"
    estimated_shipping_costs:
      small_kit: "$8–$12 (USPS Priority flat rate medium box)"
      full_kit_with_headset: "$15–$20 (USPS Priority large flat rate box)"
    headset_shipping: "If dropshipped from supplier, shipping is typically free on orders $100+ from PilotMall/MyPilotStore"

  return_policy_considerations:
    headsets:
      policy: "30-day return if unopened/unused. Defective units handled through manufacturer warranty."
      notes: |
        Headsets are personal protective equipment — hygiene concerns with returns.
        Most aviation retailers accept returns only if sealed/unused.
        Defective headsets go through manufacturer (Bose 5yr, Lightspeed 7yr, DC lifetime-ish).
        If selling through affiliate/dropship, the supplier handles returns.
    electronics:
      policy: "iPads follow Apple's 14-day return policy. ForeFlight subscriptions are non-refundable."
      notes: "Point students to Apple/ForeFlight directly for returns."
    supplies:
      policy: "Consumable supplies (logbooks, books, plotters) — no returns once used."
      notes: "Low cost items. Easier to just replace if defective."
    branded_merch:
      policy: "Exchange for size issues. No returns on custom printed items."
      notes: "Standard POD/custom merch policy. Printful handles defective items."

# =============================================================================
# SECTION 8: MARGIN ANALYSIS SUMMARY
# =============================================================================
margin_analysis:
  highest_margin_items:
    - item: "Stickers"
      margin: "70–85%"
    - item: "Remove Before Flight Keychains"
      margin: "70–85%"
    - item: "Logbooks"
      margin: "50–60%"
    - item: "E6-B Flight Computers"
      margin: "50–60%"
    - item: "Plotters"
      margin: "55–65%"
    - item: "Fuel Testers"
      margin: "50–60%"
    - item: "Branded Hats (bulk)"
      margin: "60–72%"
    - item: "Branded T-Shirts (bulk)"
      margin: "65–72%"

  lowest_margin_items:
    - item: "iPads"
      margin: "5–8%"
    - item: "Premium Headsets (Bose A30, Zulu 3)"
      margin: "15–25%"
    - item: "ForeFlight Subscriptions"
      margin: "10–15% (affiliate commission)"

  strategy_insight: |
    The highest-margin items are the small supplies and branded merch — exactly 
    the items that should be INCLUDED in every package to pad margins.
    
    The lowest-margin items (iPad, premium headsets) should be offered as 
    optional add-ons or through affiliate links, not as default package inclusions.
    
    Key insight: The current $3,013 bundle is dominated by the two lowest-margin 
    categories (headset + iPad) plus non-equipment exam fees. Restructuring into 
    tiered packages with many small high-margin items dramatically improves economics.

# =============================================================================
# OPEN QUESTIONS & GAPS
# =============================================================================
open_questions:
  - question: "Does Merlin want to apply for dealer/wholesale accounts with headset manufacturers (David Clark, Lightspeed, Bose)?"
    context: "Wholesale pricing requires dealer agreements, minimum order quantities, and sometimes proof of retail presence. As a flight school, Merlin may qualify for edu/dealer pricing."
    type: decision_blocker
    affects: ["package-pricing", "inventory-strategy"]

  - question: "Does Merlin want to sell packages via the existing website (Stripe checkout) or through a separate storefront (Shopify)?"
    context: "Current site has Stripe integration and an items/billing system. A Shopify storefront would integrate better with Printful POD but adds another platform to manage. Stripe checkout on existing site is simpler but less e-commerce-friendly."
    type: decision_blocker
    affects: ["implementation-approach", "merch-fulfillment"]

  - question: "What is Merlin's current branding package (logo files, brand colors, fonts)?"
    context: "Branded merch requires high-resolution logo files. Site uses 'golden' color theme. Need source files for print production."
    type: research
    affects: ["merch-design"]

  - question: "Is there physical space at Republic Airport (FRG) to store a small inventory of supplies?"
    context: "Hybrid approach assumes some local storage for handing kits to students at lessons."
    type: research
    affects: ["logistics-model"]

  - question: "Does ForeFlight offer a flight school partnership or referral program?"
    context: "ForeFlight historically has had flight school partnerships with bulk subscription discounts or referral commissions."
    type: research
    affects: ["package-pricing", "foreflight-sourcing"]

gaps:
  - area: "Exact wholesale pricing"
    description: "Wholesale costs are estimated based on typical distributor markups. Actual costs depend on dealer agreements Merlin would need to establish."
    impact: research_blocker
    affects: ["margin-calculations"]

  - area: "ForeFlight partnership terms"
    description: "Did not find current ForeFlight flight school partnership details. Terms may vary."
    impact: nice_to_know
    affects: ["tier-2-pricing"]

  - area: "Local competitor pricing at FRG"
    description: "Did not research what other flight schools at Republic Airport specifically charge or include. FRG competitors include Mid Island Air Service, National Aviation Academy, etc."
    impact: nice_to_know
    affects: ["competitive-positioning"]
