        retail_price: "$50–$65"
        margin_pod: "40–50%"
        margin_bulk: "55–70%"

      - type: "Tote Bags / Canvas Bags"
        why: "Practical for carrying books/supplies. Walking billboard."
        cost_pod: "$10–$15"
        cost_bulk: "$5–$8"
        retail_price: "$18–$25"
        margin_pod: "40–55%"
        margin_bulk: "65–75%"

      - type: "Keychains / Remove Before Flight Tags"
        why: "Aviation-specific. Remove Before Flight tags are iconic. Low cost impulse buy."
        cost_bulk: "$1–$3 per unit (custom embroidered, 100+ qty)"
        retail_price: "$8–$12"
        margin_bulk: "70–85%"
        notes: "Custom 'MERLIN FLIGHT TRAINING' Remove Before Flight tag would be great brand piece."

    niche:
      - type: "Aviation Coffee Mugs"
        cost_pod: "$8–$12"
        retail_price: "$15–$22"
      - type: "Headset Bag (branded)"
        cost_bulk: "$8–$12"
        retail_price: "$25–$35"
        notes: "Include branded headset bag with headset purchases"

  recommended_suppliers:
    print_on_demand:
      - name: "Printful"
        pros: "Largest POD selection. Ships from US/EU. Shopify/Stripe integration. No minimum orders."
        cons: "Higher per-unit cost vs bulk. 2–5 day production time."
        best_for: "Testing designs, low-volume items, avoiding inventory risk"
        url: "printful.com"

      - name: "Printify"
        pros: "Multiple print providers (price competition). Good quality options."
        cons: "Quality varies by provider. Slightly less polished than Printful."
        best_for: "Price comparison, alternative to Printful"

    bulk_suppliers:
      - name: "StickerMule"
        best_for: "Stickers, labels, magnets"
        notes: "Frequent sales (often 50%+ off). Fast shipping. Excellent quality."

      - name: "CustomInk"
        best_for: "Bulk t-shirts, hoodies, hats"
        notes: "Good for orders of 12+ items. Fair pricing, reliable quality."

      - name: "SS Activewear / SanMar"
        best_for: "Blank apparel wholesale (then screen print locally)"
        notes: "Cheapest blank pricing if using a local screen printer."

      - name: "Richardson (direct or via distributors)"
        best_for: "Trucker hats (Richardson 112 is THE standard)"
        notes: "Most POD services use Richardson blanks anyway."

  strategy_recommendation: |
    Start with Printful (POD) for initial testing — zero inventory risk, ships automatically.
    Once best-selling designs are identified (likely: hat + t-shirt + sticker pack), 
    order those top 3 in bulk for better margins.
    
    Suggested initial Merlin merch line:
    1. "Merlin Flight Training" embroidered trucker hat (black/gold to match brand)
    2. "Merlin Flight Training" t-shirt with wings/propeller logo
    3. "Merlin Flight Training" sticker pack (3–5 designs: logo, FRG airport, wings, humorous aviation)
    4. "Remove Before Flight" keychain with Merlin branding
    5. Branded metal water bottle (practical + visible in cockpit)

