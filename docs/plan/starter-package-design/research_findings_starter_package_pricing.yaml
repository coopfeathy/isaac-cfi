# =============================================================================
# SECTION 2: COMPETITOR FLIGHT SCHOOL STARTER KITS
# =============================================================================
competitor_starter_kits:
  industry_overview: |
    Flight schools typically handle equipment in one of three ways:
    1. Required purchase list — student buys items independently (most Part 61 schools)
    2. Bundled kits — school sells pre-assembled kits at a slight markup or discount (larger Part 141 schools)
    3. Included with enrollment — equipment cost baked into tuition (expensive collegiate programs)
    
    Major aviation retailers (Sporty's, PilotMall, ASA, Gleim, Jeppesen) sell pre-packaged student pilot kits ranging from $150–$400 for study materials only (no headset/iPad).

  available_student_kits:
    - provider: "Gleim Private Pilot Kit"
      contents: "Software with practice exams, books, plotter, E6-B flight computer, carry bag"
      price_range: "$150–$200"
      notes: "Study materials only. No headset, no electronics."

    - provider: "ASA Student Pilot Kit"
      contents: "VFR Maneuvering handbook, private pilot oral exam guide, flight planning sheets, supplementary materials"
      price_range: "$100–$150"
      notes: "Bare bones study kit. Needs bag, headset, everything else."

    - provider: "Jeppesen Private Pilot Kit"
      contents: "Textbook, workbook, FAR/AIM, plotter, flight computer, flight bag, study guide"
      price_range: "$200–$350"
      notes: "More comprehensive but still no electronics or headset."

    - provider: "King Schools Complete Private Pilot Kit"
      contents: "Video ground school course, test prep, logbook, plotter, E6-B"
      price_range: "$250–$400"
      notes: "Includes ground school course access, which is a high-value differentiator."

  competitor_school_approaches:
    - type: "Part 61 independent instructors (like Merlin)"
      typical_approach: "Provide a recommended equipment list. Students buy their own. Instructor may lend a spare headset for first few flights."
      opportunity: "Merlin can differentiate by offering curated, ready-to-go packages that save students the research and shopping hassle."

    - type: "Part 141 flight academies"
      typical_approach: "Often have a pilot shop on-site. May require specific kits. Some include basic materials in enrollment fee."
      opportunity: "Merlin can't match the on-site shop experience but CAN offer same convenience via e-commerce + bundled pricing."

    - type: "Large FBO-attached schools"
      typical_approach: "Partner with Sporty's/MyPilotStore for student discounts. Some have affiliate links."
      opportunity: "Merlin could earn affiliate income AND sell direct, capturing both referral fees and direct margin."

# =============================================================================
# SECTION 3: HEADSET TIER STRATEGY
# =============================================================================
headset_tiers:
  anr_vs_pnr_summary:
    passive_noise_reduction:
      how_it_works: "Physical barrier — thick ear cup padding and firm clamping force seal out sound"
      effective_on: "High-frequency noise (wind hiss)"
      typical_NRR: "20–26 dB"
      pros:
        - "No batteries needed"
        - "Simple, reliable — nothing to turn on"
        - "Cheaper ($100–$400)"
        - "Extremely durable (David Clarks last 20+ years)"
      cons:
        - "Must clamp tightly for good seal — uncomfortable after 2–3 hours"
        - "Poor at blocking low-frequency engine drone"
        - "Heavier (16–18 oz typically)"
        - "Seal broken by glasses or long hair"

    active_noise_reduction:
      how_it_works: "Electronics generate anti-noise signal to cancel incoming sound waves, especially low-frequency engine drone"
      effective_on: "Low-frequency noise (engine/propeller drone) — the main fatigue-causing noise"
      typical_NRR: "23 dB passive + 30+ dB with ANR active"
      pros:
        - "Dramatically reduces cockpit fatigue"
        - "Lighter clamping force needed (more comfortable)"
        - "Better communication clarity"
        - "Bluetooth for music/phone/ForeFlight audio"
      cons:
        - "Requires batteries (AA or rechargeable)"
        - "More expensive ($500–$1,300)"
        - "More complex — potential electronic failure points"
        - "Slightly heavier due to electronics (offset by lighter clamp)"

    student_recommendation: |
      For training flights (1–2 hours), a good PNR headset is perfectly adequate.
      Many students earn their PPL with passive headsets and upgrade later.
      ANR becomes more valuable for cross-country flights (2+ hours) and post-PPL flying.
      Isaac's blog already notes: "You do not need a headset to start your instruction, I (and most instructors) have a spare that you can use."

  budget_tier:
