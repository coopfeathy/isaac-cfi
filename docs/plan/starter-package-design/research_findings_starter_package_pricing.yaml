        cost_pod: "$12–$18"
        cost_bulk: "$6–$10 per unit (48+ qty)"
        retail_price: "$22–$35"
        margin_pod: "40–55%"
        margin_bulk: "65–75%"

    moderate_performers:
      - type: "Hoodies / Crew Neck Sweatshirts"
