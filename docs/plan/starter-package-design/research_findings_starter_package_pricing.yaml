branded_merchandise:
  merch_types_for_flight_schools:
    high_performers:
      - type: "Trucker/Baseball Hats"
        why: "Pilots LOVE hats. Worn daily. Visible brand advertising. Aviation culture is hat-heavy."
        cost_pod: "$14–$18 (Printful embroidered trucker cap)"
        cost_bulk: "$8–$12 per unit (72+ qty, Richardson 112 or similar, embroidered)"
        retail_price: "$28–$35"
        margin_pod: "48–55%"
        margin_bulk: "60–72%"

      - type: "T-Shirts"
        why: "Universal appeal. Good for first solo celebrations, gift shop, and events."
        cost_pod: "$13–$16 (Printful Cotton Heritage or Bella+Canvas)"
        cost_bulk: "$7–$10 per unit (48+ qty, Bella+Canvas 3001 or Next Level 6210)"
        retail_price: "$25–$35"
        margin_pod: "45–55%"
        margin_bulk: "65–72%"

      - type: "Stickers"
        why: "Cheapest merch item. Students love putting them on flight bags, iPads, water bottles. Great giveaway."
        cost_pod: "$2–$4 (Printful kiss-cut stickers)"
        cost_bulk: "$0.50–$1.50 per unit (100+ qty, StickerMule or StickerGiant)"
        retail_price: "$3–$8"
        margin_pod: "25–60%"
        margin_bulk: "70–85%"
        notes: "Include one free sticker in every package — brand impressions for pennies."

      - type: "Water Bottles / Tumblers"
