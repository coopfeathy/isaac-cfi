plan_id: starter-package-design
objective: "Research flight training starter package design, pricing strategy, headset tiers, essential items, branded merchandise, and logistics for Merlin Flight Training"
focus_area: starter_package_pricing
created_at: "2026-04-05"
created_by: gem-researcher
status: completed

tldr: |
  - Merlin currently lists $3,013 in student equipment (headset $1,099, iPad $499, ForeFlight $240, checkride $1,000, written $175) — this bundle only includes premium-tier items and exam fees, missing many essentials students actually need day-to-day
  - Aviation headsets span $100–$1,299 across 3 clear tiers: Budget PNR ($100–$200), Mid-Range PNR/entry ANR ($300–$750), Premium ANR ($849–$1,299) — huge margin opportunity by offering tiered bundles instead of assuming all students buy $1,099 headsets
  - Essential student items beyond headset/iPad/ForeFlight include: kneeboard ($25–$50), logbook ($10–$20), E6-B flight computer ($25–$45), plotter ($10–$15), FAR/AIM ($20–$30), flashlight ($15–$30), fuel tester ($15), flight bag ($35–$329) — most have 40–60% markup potential
  - Branded merchandise via print-on-demand (Printful) requires zero inventory: t-shirts cost ~$13–$15 (sell $28–$35), trucker hats ~$15–$18 (sell $30–$35), stickers ~$2–$4 (sell $5–$8) — ideal for a small school with no warehouse
  - Three recommended package tiers: Essentials (~$350–$400 retail), Standard (~$850–$950 retail), Premium (~$1,500–$1,600 retail) — bundling creates perceived value, locks students into the Merlin ecosystem, and generates 30–45% gross margins

research_metadata:
  methodology: "Hybrid retrieval: semantic_search + grep_search on codebase for existing pricing/equipment data, fetch_webpage for PilotMall headset guide, student essentials guide, flight bag essentials, MyPilotStore pricing, Printful print-on-demand catalog. Sequential analysis of competitor product listings and pricing."
  scope: "Broad — covered headset market (all tiers), student pilot essential items (ranked), branded merchandise suppliers and economics, and package tier design with margin analysis. Cross-referenced with Merlin's existing pricing page and training-options page."
  confidence: high
  coverage: 85
  decision_blockers: 2
  research_blockers: 0

