  - id: T01
    title: "Database migration — new tables and slot_requests extension"
    description: |
      Create SQL migration for the calendar rework:
      1. CREATE TABLE instructor_availability (id, day_of_week, start_time, end_time, is_active, created_at, updated_at)
      2. CREATE TABLE availability_overrides (id, override_date, start_time, end_time, is_available, reason, created_at)
      3. CREATE TABLE notification_preferences (id, user_id FK, email_enabled default true, sms_enabled default true, created_at, updated_at)
      4. ALTER TABLE slot_requests ADD COLUMN request_type TEXT CHECK (request_type IN ('training', 'discovery_flight')) DEFAULT 'discovery_flight'
      5. ALTER TABLE slot_requests ADD COLUMN denial_reason TEXT
      6. ALTER TABLE slot_requests ADD COLUMN user_id_student UUID REFERENCES auth.users(id) — for authenticated student requests
      7. Enable RLS on all new tables. Admin full access. Students read own notification_preferences and own slot_requests.
      8. Add RLS policy on slot_requests allowing students to SELECT their own rows (WHERE user_id = auth.uid() OR user_id_student = auth.uid())
      9. Create indexes on instructor_availability(day_of_week), availability_overrides(override_date), slot_requests(request_type, status)
    wave: 1
    agent: gem-implementer
    prototype: false
    covers:
