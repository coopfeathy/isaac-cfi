plan_id: calendar-rework-2026
objective: >
  Replace the manual slot-creation booking model with an instructor availability
  template + student request/approval workflow. Build student-facing week-view calendar,
  admin calendar overhaul, discovery flight calendar integration, notification system,
  and cancellation system. Preserve existing CalDAV sync, Stripe payments, and funnel steps 1-3.
created_at: "2026-04-05T12:00:00Z"
created_by: gem-planner
status: pending_approval
research_confidence: high

plan_metrics:
  wave_1_task_count: 5
  total_dependencies: 48
  risk_score: medium

tldr: |
  23 tasks across 4 waves to rework the Merlin Flight Training calendar system.
  Wave 1 lays the database + type + API foundation (6 tasks).
  Wave 2 builds the availability engine, notification layer, and all UI components (7 tasks).
  Wave 3 integrates the admin calendar overhaul, discovery flight picker, and approval workflow (5 tasks).
  Wave 4 adds notification preferences, cancellation, 24hr reminders, and final cleanup (5 tasks).
  Key risks: availability engine correctness, concurrent request handling, CalDAV external event
  subtraction (current pull filters to @merlinflight.com UIDs only — needs expansion), and
  discovery flight funnel regression.

open_questions:
  - "CalDAV pullEventsFromCalendar currently filters to @merlinflight.com UIDs only. The availability engine needs ALL iCloud events to subtract external conflicts. Requires a new pull function or modified filter."
  - "Should the 24-hour reminder be a Netlify Scheduled Function or a Supabase Edge Function (pg_cron)? Plan assumes Netlify scheduled function matching existing cron pattern."
  - "Stripe payment link — reuse existing Stripe Checkout Session creation or build new dedicated endpoint? Plan assumes extending existing Stripe integration."

pre_mortem:
  overall_risk_level: medium
  critical_failure_modes:
    - scenario: "Availability engine incorrectly computes open blocks — students see wrong times, leading to double-bookings or phantom availability"
      likelihood: medium
      impact: critical
      mitigation: "Unit test engine with deterministic fixtures covering edge cases: overlapping bookings, CalDAV conflicts, overrides that add/remove time, midnight boundary crossings. Add integration test with seeded DB data."
    - scenario: "Two students request the same time slot simultaneously — both succeed, creating conflicting pending requests"
      likelihood: medium
      impact: high
      mitigation: "Accept concurrent pending requests (this is a request model, not instant booking). Admin sees both, approves one, denies the other. On approval, re-validate availability before creating slot. Use DB-level check constraint or SELECT FOR UPDATE."
    - scenario: "Discovery flight funnel regression — step 4 replacement breaks data flow from steps 1-3, losing prospect data"
      likelihood: low
      impact: high
      mitigation: "Step 4 replacement reads prospect data from existing session/params. Integration test: complete steps 1-3, verify prospect row exists, then verify step 4 calendar picker loads with correct prospect context."
    - scenario: "CalDAV push fails silently after approval — event not synced to iCloud, instructor has no visibility"
      likelihood: medium
      impact: medium
      mitigation: "Existing sync_status tracking on slots table catches push failures. Approval flow sets sync_status=pending_push. Background sync retry handles failures. Admin notification on persistent sync failure."
    - scenario: "RLS policy gaps on new tables expose student data across accounts"
      likelihood: low
      impact: critical
      mitigation: "Wave 1 review task explicitly validates RLS policies on all new tables. slot_requests must restrict student reads to own rows. notification_preferences must restrict to own row."
    - scenario: "AdminBookingPlanner removal breaks admin page — other tabs or functionality depends on shared state"
      likelihood: low
      impact: medium
      mitigation: "Audit AdminBookingPlanner imports and integration points before removal. Admin page uses tab system — replacement component plugs into same tab slot."
  assumptions:
    - "Single instructor system — no multi-instructor scheduling conflicts"
    - "Existing CalDAV sync (tsdav), Stripe, Twilio, and Resend integrations are stable and working"
    - "shadcn/ui components available via components.json configuration"
    - "Supabase service role key available for admin API routes"
    - "Netlify deploys support scheduled functions for cron tasks"
    - "Discovery flight funnel steps 1-3 pass prospect data via URL params or session storage"
    - "Existing backup queue system (sequential SMS notification) works and can be triggered by cancellation"

implementation_specification:
  code_structure: |
    Server logic in lib/ (availability.ts, notifications.ts).
    API routes under app/api/ following Next.js App Router conventions.
    Calendar UI components under app/components/calendar/ as a cohesive module.
    Admin-specific components under app/components/admin/.
    Database migration as standalone SQL file in supabase/.
    TypeScript types extended in lib/supabase.ts.
  affected_areas:
    - "supabase/ — new migration SQL for 3 new tables + slot_requests alterations"
    - "lib/supabase.ts — new TypeScript interfaces for all new tables"
    - "lib/ — new availability.ts and notifications.ts modules"
    - "app/api/admin/ — new availability, override, and slot-request action routes"
    - "app/api/slot-requests/route.ts — extended for training request type"
    - "app/components/calendar/ — new directory with all calendar UI components"
    - "app/components/admin/ — AvailabilityTemplateEditor, OverrideManager"
    - "app/admin/page.tsx — replace AdminBookingPlanner with new admin calendar"
    - "app/discovery-flight-pt4/page.tsx — replace thank-you with calendar picker"
    - "app/components/AdminBookingPlanner.tsx — deprecated/removed"
  component_details:
    - component: "lib/availability.ts (Availability Computation Engine)"
      responsibility: "Compute real-time available time blocks for any date range by subtracting bookings, CalDAV events, and overrides from instructor availability template."
      interfaces:
        - "computeAvailability(startDate: Date, endDate: Date, slotDuration: number): Promise<AvailableBlock[]>"
        - "getWeekAvailability(weekStart: Date, type: 'training' | 'discovery_flight'): Promise<DayAvailability[]>"
    - component: "lib/notifications.ts (Notification Service)"
      responsibility: "Centralized notification dispatch for all calendar lifecycle events. Wraps Resend (email) and Twilio (SMS) with type-safe functions per event type. Respects student notification preferences."
      interfaces:
        - "notifyRequestSubmitted(request: SlotRequest): Promise<void>"
        - "notifyRequestApproved(request: SlotRequest, paymentLink: string): Promise<void>"
        - "notifyRequestDenied(request: SlotRequest, reason?: string): Promise<void>"
        - "sendReminder(booking: Booking, hoursUntil: number): Promise<void>"
        - "notifyCancellation(booking: Booking, isLate: boolean): Promise<void>"
    - component: "app/components/calendar/StudentWeekCalendar.tsx"
      responsibility: "Responsive week-view calendar for students showing Available, Busy, and My Requests states. Tap-based interactions, no drag. Week navigation."
      interfaces:
        - "StudentWeekCalendar: React.FC<{ userId: string }>"
    - component: "app/components/calendar/AdminWeekCalendar.tsx"
      responsibility: "Full admin week-view calendar showing all bookings, pending requests with names, availability blocks, and overrides. Integrates quick actions."
      interfaces:
        - "AdminWeekCalendar: React.FC<{ onAction: (action: AdminCalendarAction) => void }>"
    - component: "app/components/calendar/DiscoveryFlightPicker.tsx"
      responsibility: "Calendar picker for discovery flight step 4 showing available 1.5hr blocks. Creates slot_request with type=discovery_flight."
      interfaces:
        - "DiscoveryFlightPicker: React.FC<{ prospectId: string; prospectData: ProspectInfo }>"
  dependencies:
    - component: "StudentWeekCalendar"
      relationship: "Calls lib/availability.ts via API route to get available blocks, calls slot-requests API to submit requests"
    - component: "AdminWeekCalendar"
      relationship: "Calls lib/availability.ts via API route, reads slot_requests, calls approve/deny API routes"
    - component: "DiscoveryFlightPicker"
      relationship: "Calls lib/availability.ts via API route for 1.5hr blocks, creates slot_request via API"
    - component: "lib/notifications.ts"
      relationship: "Imports from lib/resend.ts and lib/twilio.ts"
    - component: "lib/availability.ts"
      relationship: "Queries instructor_availability, availability_overrides, slots tables via Supabase. Calls CalDAV pull for external events."
  integration_points:
    - "Admin page (app/admin/page.tsx): Replace AdminBookingPlanner import with AdminWeekCalendar in slots tab"
    - "Discovery flight pt4 (app/discovery-flight-pt4/page.tsx): Replace thank-you content with DiscoveryFlightPicker"
    - "Stripe: Approval workflow calls existing Stripe Checkout Session creation to generate payment link"
    - "CalDAV: Approval workflow calls existing pushEventToCalendar from lib/caldav.ts"
    - "Twilio: Notification service uses existing sendTwilioMessage from lib/twilio.ts"
    - "Resend: Notification service uses existing resend client from lib/resend.ts"

