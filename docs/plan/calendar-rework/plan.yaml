  - id: T07
    title: "Availability computation engine"
    description: |
      Create lib/availability.ts with the core scheduling logic:
      1. computeAvailability(startDate, endDate): Queries instructor_availability template,
         subtracts booked slots (from slots table where is_booked=true within range),
         subtracts CalDAV external events (requires new pull that fetches ALL iCloud events,
         not just @merlinflight.com — modify filter in pullEventsFromCalendar or create separate function),
         applies availability_overrides (is_available=false removes time, is_available=true adds time).
         Returns AvailableBlock[] array.
      2. getWeekAvailability(weekStart, type): Wrapper that computes availability for a full week
         and splits into slot-duration blocks (2hr for training, 1.5hr for discovery_flight).
         Returns DayAvailability[] array suitable for calendar rendering.
      3. Internal helpers: mergeTimeRanges, subtractTimeRanges, splitIntoSlots.
      4. All time arithmetic uses UTC. Display formatting is client-side responsibility.
      IMPORTANT: Current pullEventsFromCalendar in lib/caldav.ts filters to @merlinflight.com UIDs only.
      The engine needs ALL events from iCloud to detect external conflicts. Create a new
      pullAllEventsFromCalendar function that omits the UID filter.
